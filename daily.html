<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XAU Elite | 日內分析</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Noto+Sans+TC:wght@300;400;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #c9a84c; --gold-dim: rgba(201,168,76,0.15);
  --bg: #080b12; --bg2: #0d1220; --bg3: #111827;
  --border: rgba(201,168,76,0.2); --text: #e8eaf0; --text-dim: #6b7a99;
  --green: #34d399; --red: #f87171; --yellow: #fbbf24; --purple: #a78bfa;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Noto Sans TC', sans-serif; min-height: 100vh; }
body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse 80% 50% at 20% 20%, rgba(201,168,76,0.03) 0%, transparent 60%); pointer-events: none; z-index: 0; }

nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(8,11,18,0.9); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); padding: 0 40px; height: 64px; display: flex; align-items: center; justify-content: space-between; }
.nav-logo { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; color: var(--gold); text-decoration: none; letter-spacing: 2px; }
.nav-right { display: flex; align-items: center; gap: 12px; }
.nav-back { padding: 7px 16px; background: var(--gold-dim); border: 1px solid var(--border); border-radius: 8px; color: var(--gold); font-size: 12px; text-decoration: none; font-family: 'IBM Plex Mono', monospace; }
.live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); animation: blink 2s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

.container { max-width: 960px; margin: 0 auto; padding: 90px 24px 60px; position: relative; z-index: 1; }

.page-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 16px; }
.page-header-left h1 { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 700; color: #f0f4ff; margin-bottom: 4px; }
.page-header-left p { font-size: 12px; color: var(--text-dim); font-family: 'IBM Plex Mono', monospace; }
.price-block { text-align: right; }
.price-tag { font-family: 'IBM Plex Mono', monospace; font-size: 32px; font-weight: 600; color: var(--gold); }
.price-change { font-size: 13px; margin-top: 2px; font-family: 'IBM Plex Mono', monospace; }

.date-selector { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
.date-label { font-size: 11px; color: var(--text-dim); font-family: 'IBM Plex Mono', monospace; letter-spacing: 1px; }
.date-btn { padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg2); color: var(--text-dim); font-size: 12px; cursor: pointer; font-family: 'IBM Plex Mono', monospace; transition: all 0.2s; }
.date-btn:hover, .date-btn.active { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); }
.date-input { padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg2); color: var(--text); font-size: 12px; font-family: 'IBM Plex Mono', monospace; outline: none; }
.date-input:focus { border-color: var(--gold); }

.weekend-notice { background: rgba(251,191,36,0.08); border: 1px solid rgba(251,191,36,0.25); border-radius: 14px; padding: 24px; text-align: center; margin-bottom: 16px; display: none; }
.weekend-notice h2 { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--yellow); margin-bottom: 8px; }
.weekend-notice p { font-size: 13px; color: var(--text-dim); }

.direction-bar { border-radius: 14px; padding: 20px 24px; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
.direction-bar.bullish { background: rgba(52,211,153,0.08); border: 1px solid rgba(52,211,153,0.25); }
.direction-bar.bearish { background: rgba(248,113,113,0.08); border: 1px solid rgba(248,113,113,0.25); }
.direction-bar.neutral { background: rgba(251,191,36,0.08); border: 1px solid rgba(251,191,36,0.25); }
.dir-left { display: flex; align-items: center; gap: 14px; }
.dir-icon { font-size: 28px; }
.dir-label { font-size: 10px; color: var(--text-dim); font-family: 'IBM Plex Mono', monospace; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 3px; }
.dir-value { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; }
.bullish .dir-value { color: var(--green); }
.bearish .dir-value { color: var(--red); }
.neutral .dir-value { color: var(--yellow); }
.dir-bias { font-size: 13px; color: #b0b8cc; max-width: 520px; line-height: 1.6; }

.main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
.full-width { grid-column: 1 / -1; }
.card { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
.card-header { padding: 14px 20px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: space-between; }
.card-title { font-size: 11px; font-weight: 600; color: var(--text-dim); letter-spacing: 1.5px; text-transform: uppercase; font-family: 'IBM Plex Mono', monospace; }
.card-body { padding: 16px 20px; }

.zone-item { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
.zone-item:last-child { border-bottom: none; }
.zone-tag { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 4px; font-family: 'IBM Plex Mono', monospace; min-width: 36px; text-align: center; }
.zone-res { background: rgba(248,113,113,0.12); color: var(--red); border: 1px solid rgba(248,113,113,0.2); }
.zone-sup { background: rgba(52,211,153,0.12); color: var(--green); border: 1px solid rgba(52,211,153,0.2); }
.zone-key { background: rgba(201,168,76,0.12); color: var(--gold); border: 1px solid rgba(201,168,76,0.2); }
.zone-price { font-family: 'IBM Plex Mono', monospace; font-size: 14px; font-weight: 600; color: #f0f4ff; min-width: 70px; }
.zone-desc { font-size: 12px; color: var(--text-dim); flex: 1; }

.bias-point { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 12px; }
.bias-point:last-child { margin-bottom: 0; }
.bias-icon { font-size: 15px; flex-shrink: 0; }
.bias-text { font-size: 13px; color: #b0b8cc; line-height: 1.6; }

.eco-item { display: flex; gap: 12px; align-items: flex-start; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
.eco-item:last-child { border-bottom: none; }
.eco-time { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text-dim); min-width: 52px; padding-top: 2px; }
.eco-impact { width: 7px; height: 7px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }
.impact-high { background: var(--red); box-shadow: 0 0 5px var(--red); }
.impact-medium { background: var(--yellow); }
.impact-low { background: var(--text-dim); }
.eco-name { font-size: 13px; color: var(--text); margin-bottom: 2px; }
.eco-detail { font-size: 11px; color: var(--text-dim); font-family: 'IBM Plex Mono', monospace; }

.news-item { padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.04); cursor: pointer; transition: padding 0.2s; }
.news-item:last-child { border-bottom: none; }
.news-item:hover { padding-left: 4px; }
.news-item:hover .news-title { color: var(--gold); }
.news-time { font-size: 10px; color: var(--text-dim); font-family: 'IBM Plex Mono', monospace; margin-bottom: 4px; }
.news-title { font-size: 13px; color: var(--text); line-height: 1.5; transition: color 0.2s; }
.news-sentiment { display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 10px; font-weight: 600; margin-left: 6px; }
.sent-bullish { background: rgba(52,211,153,0.15); color: var(--green); }
.sent-bearish { background: rgba(248,113,113,0.15); color: var(--red); }
.sent-neutral { background: rgba(107,122,153,0.15); color: var(--text-dim); }

.macro-stat { background: var(--bg3); border-radius: 10px; padding: 14px; border: 1px solid rgba(255,255,255,0.05); }
.macro-stat-label { font-size: 10px; color: var(--text-dim); font-family: 'IBM Plex Mono', monospace; letter-spacing: 1px; margin-bottom: 6px; }
.macro-stat-val { font-size: 15px; font-weight: 600; }
.macro-stat-note { font-size: 11px; color: var(--text-dim); margin-top: 4px; }
.macro-text { font-size: 13px; color: #b0b8cc; line-height: 1.9; margin-top: 16px; }

.loading { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 24px; color: var(--text-dim); font-size: 12px; font-family: 'IBM Plex Mono', monospace; }
.loading-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); animation: ld 1s infinite; }
.loading-dot:nth-child(2){animation-delay:0.2s} .loading-dot:nth-child(3){animation-delay:0.4s}
@keyframes ld { 0%,100%{opacity:0.2} 50%{opacity:1} }

.disclaimer { text-align: center; font-size: 11px; color: var(--text-dim); font-family: 'IBM Plex Mono', monospace; margin-top: 24px; line-height: 1.7; }

.articles-section { margin-top: 24px; }
.articles-section-title { font-family: 'Playfair Display', serif; font-size: 15px; color: var(--gold); margin-bottom: 14px; letter-spacing: 1px; display: flex; align-items: center; gap: 8px; }
.article-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 20px 24px; margin-bottom: 12px; transition: border-color 0.2s; }
.article-card:hover { border-color: rgba(201,168,76,0.4); }
.article-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
.article-date { font-size: 11px; color: var(--text-dim); font-family: 'IBM Plex Mono', monospace; }
.article-badge { font-size: 10px; padding: 2px 8px; border-radius: 4px; background: var(--gold-dim); border: 1px solid var(--border); color: var(--gold); font-family: 'IBM Plex Mono', monospace; }
.article-title { font-size: 15px; font-weight: 600; color: #f0f4ff; margin-bottom: 8px; line-height: 1.4; }
.article-content { font-size: 13px; color: #b0b8cc; line-height: 1.8; }
.article-prices { display: flex; gap: 16px; margin-top: 10px; flex-wrap: wrap; }
.article-price-tag { font-size: 11px; font-family: 'IBM Plex Mono', monospace; color: var(--text-dim); }

@media(max-width:768px){
  nav{padding:0 16px}
  .container{padding:80px 16px 40px}
  .main-grid{grid-template-columns:1fr}
  .full-width{grid-column:1}
  .price-tag{font-size:24px}
}
</style>
</head>
<body>
<nav>
  <a href="/" class="nav-logo">XAU ELITE</a>
  <div class="nav-right">
    <div class="live-dot" id="liveDot"></div>
    <a href="/" class="nav-back">← 返回</a>
  </div>
</nav>

<div class="container">
  <div class="page-header">
    <div class="page-header-left">
      <h1>XAU/USD 日內分析</h1>
      <p id="pageSubDate">載入中...</p>
    </div>
    <div class="price-block">
      <div class="price-tag" id="goldPrice">—</div>
      <div class="price-change" id="goldChange">—</div>
    </div>
  </div>

  <div class="date-selector">
    <span class="date-label">查看日期：</span>
    <button class="date-btn active" id="btnToday" onclick="loadByDate('today', this)">今日</button>
    <button class="date-btn" id="btnYest" onclick="loadByDate('yesterday', this)">昨日</button>
    <button class="date-btn" id="btn2" onclick="loadByDate('2daysago', this)">前天</button>
    <input type="date" class="date-input" id="customDate" onchange="loadByDate(this.value, null)">
  </div>

  <!-- 週末提示 -->
  <div class="weekend-notice" id="weekendNotice">
    <h2>🌙 市場休市中</h2>
    <p>黃金現貨週六、週日休市，請選擇週一至週五的分析。<br>下週開盤分析將於週一早上 06:00 自動發布。</p>
  </div>

  <!-- 方向欄 -->
  <div class="direction-bar neutral" id="directionBar" style="display:none">
    <div class="dir-left">
      <div class="dir-icon" id="dirIcon">◉</div>
      <div>
        <div class="dir-label">今日方向偏向</div>
        <div class="dir-value" id="dirValue">載入中</div>
      </div>
    </div>
    <div class="dir-bias" id="dirBias">正在載入分析...</div>
  </div>

  <div class="main-grid" id="mainGrid" style="display:none">
    <div class="card">
      <div class="card-header"><div class="card-title">💡 日內偏見</div></div>
      <div class="card-body" id="biasBody"><div class="loading"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div></div></div>
    </div>
    <div class="card">
      <div class="card-header"><div class="card-title">🎯 今日關鍵位</div></div>
      <div class="card-body" id="levelsBody"><div class="loading"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div></div></div>
    </div>
    <div class="card">
      <div class="card-header"><div class="card-title">📅 重要總經事件</div></div>
      <div class="card-body" id="ecoBody"><div class="loading"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div></div></div>
    </div>
    <div class="card">
      <div class="card-header"><div class="card-title">📰 市場重點新聞</div></div>
      <div class="card-body" id="newsBody"><div class="loading"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div></div></div>
    </div>
    <div class="card full-width">
      <div class="card-header"><div class="card-title">🌍 總經背景分析</div></div>
      <div class="card-body" id="macroBody"><div class="loading"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div></div></div>
    </div>
  </div>

  <!-- 市場分析文章區塊 -->
  <div class="articles-section" id="articlesSection" style="display:none">
    <div class="articles-section-title">📝 最新市場分析文章</div>
    <div id="articlesBody">
      <div class="loading"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div></div>
    </div>
  </div>

  <div class="disclaimer">⚠️ 本頁數據為教育用途，不構成投資建議。實際交易請結合個人風控，單筆虧損控制帳戶 1%～3%。</div>
</div>

<script>
function getDateStr(offset=0) {
  const d = new Date();
  d.setDate(d.getDate() - offset);
  return d.toISOString().split('T')[0];
}

function isWeekend(dateStr) {
  const d = new Date(dateStr);
  const day = d.getDay();
  return day === 0 || day === 6;
}

function formatDate(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('zh-TW', { year:'numeric', month:'long', day:'numeric', weekday:'long' });
}

async function loadByDate(target, btn) {
  document.querySelectorAll('.date-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');

  let dateStr;
  if (target === 'today') dateStr = getDateStr(0);
  else if (target === 'yesterday') dateStr = getDateStr(1);
  else if (target === '2daysago') dateStr = getDateStr(2);
  else dateStr = target;

  document.getElementById('pageSubDate').textContent = formatDate(dateStr);

  if (isWeekend(dateStr)) {
    document.getElementById('weekendNotice').style.display = 'block';
    document.getElementById('directionBar').style.display = 'none';
    document.getElementById('mainGrid').style.display = 'none';
    document.getElementById('goldPrice').textContent = '休市';
    document.getElementById('goldChange').textContent = '週末不開盤';
    document.getElementById('goldChange').style.color = '#6b7a99';
    document.getElementById('liveDot').style.background = '#6b7a99';
    document.getElementById('liveDot').style.animation = 'none';
    return;
  }

  document.getElementById('weekendNotice').style.display = 'none';
  document.getElementById('directionBar').style.display = 'flex';
  document.getElementById('mainGrid').style.display = 'grid';

  try {
    const res = await fetch(`/api/daily_analysis?date=${dateStr}`);
    const data = await res.json();
    if (!data.ok) throw new Error(data.error);
    renderAnalysis(data);
  } catch(e) {
    console.error(e);
  }
}

function renderAnalysis(data) {
  // 價格
  document.getElementById('goldPrice').textContent = data.gold_price ? data.gold_price.toFixed(2) : '—';
  const ch = data.price_change || 0;
  const chEl = document.getElementById('goldChange');
  chEl.textContent = `${ch >= 0 ? '+' : ''}${ch.toFixed(2)} USD`;
  chEl.style.color = ch >= 0 ? '#34d399' : '#f87171';

  // 方向
  const bar = document.getElementById('directionBar');
  const icons = { bullish: '▲', bearish: '▼', neutral: '◉' };
  bar.className = `direction-bar ${data.direction || 'neutral'}`;
  document.getElementById('dirIcon').textContent = icons[data.direction] || '◉';
  document.getElementById('dirValue').textContent = data.direction_text || '分析載入中';
  document.getElementById('dirBias').textContent = data.bias_summary || '';

  // 日內偏見
  const icons2 = ['🟢','📊','⚠️','🎯'];
  const biasIcons = { bullish: '🟢', bearish: '🔴', neutral: '🟡' };
  const bPoints = data.bias_points || [];
  document.getElementById('biasBody').innerHTML = bPoints.map((p, i) =>
    `<div class="bias-point"><div class="bias-icon">${i===0 ? (biasIcons[data.direction]||'🟡') : icons2[i]}</div><div class="bias-text">${p}</div></div>`
  ).join('') || '<div style="color:#6b7a99;font-size:13px;">暫無數據</div>';

  // 關鍵位
  const price = data.gold_price || 0;
  document.getElementById('levelsBody').innerHTML = `
    <div class="zone-item"><span class="zone-tag zone-res">壓力</span><span class="zone-price">${(price+35).toFixed(1)}</span><span class="zone-desc">近期高點壓力區</span></div>
    <div class="zone-item"><span class="zone-tag zone-res">壓力</span><span class="zone-price">${(price+15).toFixed(1)}</span><span class="zone-desc">M15 Pivot High</span></div>
    <div class="zone-item"><span class="zone-tag zone-key">當前</span><span class="zone-price">${price.toFixed(1)}</span><span class="zone-desc">收盤/即時價格</span></div>
    <div class="zone-item"><span class="zone-tag zone-sup">支撐</span><span class="zone-price">${(price-15).toFixed(1)}</span><span class="zone-desc">M15 Pivot Low</span></div>
    <div class="zone-item"><span class="zone-tag zone-sup">支撐</span><span class="zone-price">${(price-40).toFixed(1)}</span><span class="zone-desc">近期低點支撐區</span></div>
  `;

  // 總經事件
  const eco = data.eco_events || [];
  if (eco.length === 0) {
    document.getElementById('ecoBody').innerHTML = '<div style="color:#6b7a99;font-size:13px;text-align:center;padding:12px;">今日無重大美元經濟數據</div>';
  } else {
    document.getElementById('ecoBody').innerHTML = eco.map(e => {
      const impact = e.impact === 'high' ? 'high' : e.impact === 'medium' ? 'medium' : 'low';
      const time = (e.time||'—').substring(0,5);
      return `<div class="eco-item">
        <div class="eco-time">${time}</div>
        <div class="eco-impact impact-${impact}"></div>
        <div><div class="eco-name">${e.event||'—'}</div>
        <div class="eco-detail">實際：${e.actual||'—'} | 預期：${e.estimate||'—'} | 前值：${e.prev||'—'}</div></div>
      </div>`;
    }).join('');
  }

  // 新聞
  const news = data.news_items || [];
  if (news.length === 0) {
    document.getElementById('newsBody').innerHTML = '<div style="color:#6b7a99;font-size:13px;text-align:center;padding:12px;">暫無黃金相關新聞</div>';
  } else {
    document.getElementById('newsBody').innerHTML = news.map(n => {
      const time = n.datetime ? new Date(n.datetime*1000).toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'}) : '—';
      const sent = n.sentiment || 'neutral';
      const sentLabel = sent==='bullish'?'利多':sent==='bearish'?'利空':'中性';
      const sentClass = `sent-${sent==='bullish'?'bullish':sent==='bearish'?'bearish':'neutral'}`;
      return `<div class="news-item" onclick="window.open('${n.url||'#'}','_blank')">
        <div class="news-time">${time} · ${n.source||'—'}</div>
        <div class="news-title">${n.headline||''}<span class="news-sentiment ${sentClass}">${sentLabel}</span></div>
      </div>`;
    }).join('');
  }

  // 總經背景
  const isUp = ch >= 0;
  document.getElementById('macroBody').innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px;">
      <div class="macro-stat">
        <div class="macro-stat-label">美元指數 DXY</div>
        <div class="macro-stat-val" style="color:${isUp?'#f87171':'#34d399'}">${isUp?'偏弱 ▼':'偏強 ▲'}</div>
        <div class="macro-stat-note">美元與黃金反向</div>
      </div>
      <div class="macro-stat">
        <div class="macro-stat-label">今日波動</div>
        <div class="macro-stat-val" style="color:var(--gold)">${Math.abs(ch).toFixed(2)} USD</div>
        <div class="macro-stat-note">${Math.abs(ch)>15?'高波動':'低波動'}日</div>
      </div>
      <div class="macro-stat">
        <div class="macro-stat-label">市場情緒</div>
        <div class="macro-stat-val" style="color:${isUp?'#34d399':'#f87171'}">${isUp?'偏多':'偏空'}</div>
        <div class="macro-stat-note">依黃金走勢判斷</div>
      </div>
    </div>
    <div class="macro-text">${data.macro_text||'暫無總經分析'}</div>
  `;
}

async function loadArticles() {
  try {
    const res = await fetch('/api/articles?per_page=3');
    const data = await res.json();
    if (!data.ok || !data.articles || data.articles.length === 0) return;
    document.getElementById('articlesSection').style.display = 'block';
    document.getElementById('articlesBody').innerHTML = data.articles.map(a => {
      const dt = new Date(a.published_at);
      const dateStr = dt.toLocaleDateString('zh-TW', {year:'numeric', month:'long', day:'numeric'});
      const xauDir = a.xau_change_pct >= 0 ? '+' : '';
      const xauColor = a.xau_change_pct >= 0 ? '#34d399' : '#f87171';
      return `<div class="article-card">
        <div class="article-meta">
          <span class="article-date">${dateStr}</span>
          <span class="article-badge">XAU/USD</span>
        </div>
        <div class="article-title">${a.title}</div>
        <div class="article-content">${(a.content||'').replace(/\n/g,'<br>')}</div>
        <div class="article-prices">
          <span class="article-price-tag">黃金 <span style="color:var(--gold)">${a.xau_price!=null?a.xau_price.toFixed(2):'—'}</span> USD</span>
          <span class="article-price-tag">漲跌 <span style="color:${xauColor}">${xauDir}${a.xau_change_pct!=null?a.xau_change_pct.toFixed(2):'—'}%</span></span>
          <span class="article-price-tag">DXY <span style="color:var(--text)">${a.dxy_price!=null?a.dxy_price.toFixed(3):'—'}</span></span>
        </div>
      </div>`;
    }).join('');
  } catch(e) {
    console.error('文章載入失敗', e);
  }
}

// 初始載入
const today = new Date();
const todayStr = today.toISOString().split('T')[0];
document.getElementById('customDate').max = todayStr;
const threeMonthsAgo = new Date();
threeMonthsAgo.setMonth(threeMonthsAgo.getMonth() - 3);
document.getElementById('customDate').min = threeMonthsAgo.toISOString().split('T')[0];

loadByDate('today', document.getElementById('btnToday'));
loadArticles();
</script>
