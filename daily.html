<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XAU Elite | 日內分析</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Noto+Sans+TC:wght@300;400;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #c9a84c;
  --gold-dim: rgba(201,168,76,0.15);
  --bg: #080b12;
  --bg2: #0d1220;
  --bg3: #111827;
  --border: rgba(201,168,76,0.2);
  --text: #e8eaf0;
  --text-dim: #6b7a99;
  --green: #34d399;
  --red: #f87171;
  --yellow: #fbbf24;
  --purple: #a78bfa;
  --blue: #60a5fa;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Noto Sans TC', sans-serif; min-height: 100vh; }

body::before {
  content: ''; position: fixed; inset: 0;
  background: radial-gradient(ellipse 80% 50% at 20% 20%, rgba(201,168,76,0.03) 0%, transparent 60%);
  pointer-events: none; z-index: 0;
}

nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: rgba(8,11,18,0.9); backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 0 40px; height: 64px;
  display: flex; align-items: center; justify-content: space-between;
}

.nav-logo { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; color: var(--gold); text-decoration: none; letter-spacing: 2px; }
.nav-right { display: flex; align-items: center; gap: 12px; }
.nav-back { padding: 7px 16px; background: var(--gold-dim); border: 1px solid var(--border); border-radius: 8px; color: var(--gold); font-size: 12px; text-decoration: none; font-family: 'IBM Plex Mono', monospace; }
.nav-date { font-size: 11px; color: var(--text-dim); font-family: 'IBM Plex Mono', monospace; }

.container { max-width: 960px; margin: 0 auto; padding: 90px 24px 60px; position: relative; z-index: 1; }

/* PAGE HEADER */
.page-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 32px; flex-wrap: wrap; gap: 16px; }
.page-header-left h1 { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 700; color: #f0f4ff; margin-bottom: 4px; }
.page-header-left p { font-size: 12px; color: var(--text-dim); font-family: 'IBM Plex Mono', monospace; }
.price-tag { font-family: 'IBM Plex Mono', monospace; font-size: 28px; font-weight: 600; color: var(--gold); }
.price-change { font-size: 12px; color: var(--text-dim); text-align: right; margin-top: 2px; font-family: 'IBM Plex Mono', monospace; }

/* DIRECTION BAR */
.direction-bar { border-radius: 14px; padding: 20px 24px; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
.direction-bar.bullish { background: rgba(52,211,153,0.08); border: 1px solid rgba(52,211,153,0.25); }
.direction-bar.bearish { background: rgba(248,113,113,0.08); border: 1px solid rgba(248,113,113,0.25); }
.direction-bar.neutral { background: rgba(251,191,36,0.08); border: 1px solid rgba(251,191,36,0.25); }

.dir-left { display: flex; align-items: center; gap: 14px; }
.dir-icon { font-size: 28px; }
.dir-label { font-size: 11px; color: var(--text-dim); font-family: 'IBM Plex Mono', monospace; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 2px; }
.dir-value { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; }
.bullish .dir-value { color: var(--green); }
.bearish .dir-value { color: var(--red); }
.neutral .dir-value { color: var(--yellow); }

.dir-bias { font-size: 13px; color: var(--text); max-width: 500px; line-height: 1.6; }

/* GRID */
.main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
.full-width { grid-column: 1 / -1; }

.card { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
.card-header { padding: 14px 20px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: space-between; }
.card-title { font-size: 11px; font-weight: 600; color: var(--text-dim); letter-spacing: 1.5px; text-transform: uppercase; font-family: 'IBM Plex Mono', monospace; }
.card-body { padding: 16px 20px; }

/* KEY LEVELS */
.level-row { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 13px; }
.level-row:last-child { border-bottom: none; }
.level-name { color: var(--text-dim); display: flex; align-items: center; gap: 8px; }
.level-dot { width: 6px; height: 6px; border-radius: 50%; }
.level-val { font-family: 'IBM Plex Mono', monospace; font-weight: 600; }
.val-res { color: var(--red); }
.val-sup { color: var(--green); }
.val-key { color: var(--gold); }

/* BIAS POINTS */
.bias-point { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 10px; }
.bias-point:last-child { margin-bottom: 0; }
.bias-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
.bias-text { font-size: 13px; color: #b0b8cc; line-height: 1.6; }

/* ECONOMIC CALENDAR */
.eco-item { display: flex; gap: 12px; align-items: flex-start; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
.eco-item:last-child { border-bottom: none; }
.eco-time { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text-dim); min-width: 50px; padding-top: 2px; }
.eco-impact { width: 6px; height: 6px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
.impact-high { background: var(--red); box-shadow: 0 0 4px var(--red); }
.impact-medium { background: var(--yellow); }
.impact-low { background: var(--text-dim); }
.eco-content { flex: 1; }
.eco-name { font-size: 13px; color: var(--text); margin-bottom: 2px; }
.eco-detail { font-size: 11px; color: var(--text-dim); font-family: 'IBM Plex Mono', monospace; }

/* NEWS */
.news-item { padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.04); cursor: pointer; }
.news-item:last-child { border-bottom: none; }
.news-item:hover .news-title { color: var(--gold); }
.news-time { font-size: 10px; color: var(--text-dim); font-family: 'IBM Plex Mono', monospace; margin-bottom: 4px; }
.news-title { font-size: 13px; color: var(--text); line-height: 1.5; transition: color 0.2s; }
.news-source { font-size: 10px; color: var(--text-dim); margin-top: 4px; font-family: 'IBM Plex Mono', monospace; }
.news-sentiment { display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 10px; font-weight: 600; margin-left: 6px; }
.sent-bullish { background: rgba(52,211,153,0.15); color: var(--green); }
.sent-bearish { background: rgba(248,113,113,0.15); color: var(--red); }
.sent-neutral { background: rgba(107,122,153,0.15); color: var(--text-dim); }

/* LOADING */
.loading { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 20px; color: var(--text-dim); font-size: 12px; font-family: 'IBM Plex Mono', monospace; }
.loading-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); animation: loadingAnim 1s infinite; }
.loading-dot:nth-child(2) { animation-delay: 0.2s; }
.loading-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes loadingAnim { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }

/* WATCH ZONES */
.zone-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
.zone-item:last-child { border-bottom: none; }
.zone-tag { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 4px; font-family: 'IBM Plex Mono', monospace; }
.zone-res { background: rgba(248,113,113,0.12); color: var(--red); border: 1px solid rgba(248,113,113,0.2); }
.zone-sup { background: rgba(52,211,153,0.12); color: var(--green); border: 1px solid rgba(52,211,153,0.2); }
.zone-key { background: rgba(201,168,76,0.12); color: var(--gold); border: 1px solid rgba(201,168,76,0.2); }
.zone-price { font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 600; color: #f0f4ff; }
.zone-desc { font-size: 12px; color: var(--text-dim); flex: 1; }

.refresh-btn { padding: 4px 10px; background: transparent; border: 1px solid var(--border); border-radius: 6px; color: var(--text-dim); font-size: 10px; cursor: pointer; font-family: 'IBM Plex Mono', monospace; transition: all 0.2s; }
.refresh-btn:hover { border-color: var(--gold); color: var(--gold); }

@media (max-width: 768px) {
  nav { padding: 0 16px; }
  .container { padding: 80px 16px 40px; }
  .main-grid { grid-template-columns: 1fr; }
  .full-width { grid-column: 1; }
}
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">XAU ELITE</a>
  <div class="nav-right">
    <span class="nav-date" id="navDate"></span>
    <a href="/" class="nav-back">← 返回</a>
  </div>
</nav>

<div class="container">

  <!-- PAGE HEADER -->
  <div class="page-header">
    <div class="page-header-left">
      <h1>XAU/USD 日內分析</h1>
      <p id="pageDate">載入中...</p>
    </div>
    <div>
      <div class="price-tag" id="goldPrice">載入中...</div>
      <div class="price-change" id="goldChange">—</div>
    </div>
  </div>

  <!-- DIRECTION BAR -->
  <div class="direction-bar neutral" id="directionBar">
    <div class="dir-left">
      <div class="dir-icon" id="dirIcon">◉</div>
      <div>
        <div class="dir-label">今日方向偏向</div>
        <div class="dir-value" id="dirValue">載入分析中</div>
      </div>
    </div>
    <div class="dir-bias" id="dirBias">正在載入今日市場分析...</div>
  </div>

  <div class="main-grid">

    <!-- 日內偏見 -->
    <div class="card">
      <div class="card-header">
        <div class="card-title">💡 日內偏見</div>
      </div>
      <div class="card-body" id="biasBody">
        <div class="loading"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div></div>
      </div>
    </div>

    <!-- 今日觀察區間 -->
    <div class="card">
      <div class="card-header">
        <div class="card-title">🎯 今日關鍵位</div>
      </div>
      <div class="card-body" id="levelsBody">
        <div class="loading"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div></div>
      </div>
    </div>

    <!-- 總經事件 -->
    <div class="card">
      <div class="card-header">
        <div class="card-title">📅 今日重要事件</div>
        <button class="refresh-btn" onclick="loadCalendar()">重新整理</button>
      </div>
      <div class="card-body" id="calendarBody">
        <div class="loading"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div></div>
      </div>
    </div>

    <!-- 黃金新聞 -->
    <div class="card">
      <div class="card-header">
        <div class="card-title">📰 黃金市場新聞</div>
        <button class="refresh-btn" onclick="loadNews()">重新整理</button>
      </div>
      <div class="card-body" id="newsBody">
        <div class="loading"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div></div>
      </div>
    </div>

    <!-- 總經分析 -->
    <div class="card full-width">
      <div class="card-header">
        <div class="card-title">🌍 總經背景分析</div>
      </div>
      <div class="card-body" id="macroBody">
        <div class="loading"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div></div>
      </div>
    </div>

  </div>
</div>

<script>
const FINNHUB_KEY = 'd8ie1s9r01qm63bbl4qgd8ie1s9r01qm63bbl4r0';

// 日期設定
const now = new Date();
const dateStr = now.toLocaleDateString('zh-TW', { year:'numeric', month:'long', day:'numeric', weekday:'long' });
document.getElementById('navDate').textContent = now.toLocaleDateString('zh-TW', { month:'2-digit', day:'2-digit' });
document.getElementById('pageDate').textContent = dateStr;

// 黃金價格
async function loadGoldPrice() {
  try {
    const res = await fetch(`https://finnhub.io/api/v1/quote?symbol=OANDA:XAU_USD&token=${FINNHUB_KEY}`);
    const data = await res.json();
    if (data.c) {
      document.getElementById('goldPrice').textContent = data.c.toFixed(2);
      const change = data.d || 0;
      const changePct = data.dp || 0;
      const el = document.getElementById('goldChange');
      el.textContent = `${change >= 0 ? '+' : ''}${change.toFixed(2)} (${changePct.toFixed(2)}%)`;
      el.style.color = change >= 0 ? '#34d399' : '#f87171';
      updateDirection(data.c, change);
    }
  } catch(e) {
    document.getElementById('goldPrice').textContent = '—';
  }
}

function updateDirection(price, change) {
  const bar = document.getElementById('directionBar');
  const val = document.getElementById('dirValue');
  const icon = document.getElementById('dirIcon');
  const bias = document.getElementById('dirBias');

  if (change > 5) {
    bar.className = 'direction-bar bullish';
    val.textContent = '多方偏向 BULLISH';
    icon.textContent = '▲';
    bias.textContent = `今日黃金走勢偏強，當前價位 ${price.toFixed(2)}，整體結構多方佔優。關注上方壓力位是否能有效突破，若能守住關鍵支撐則多方格局維持。`;
  } else if (change < -5) {
    bar.className = 'direction-bar bearish';
    val.textContent = '空方偏向 BEARISH';
    icon.textContent = '▼';
    bias.textContent = `今日黃金走勢偏弱，當前價位 ${price.toFixed(2)}，整體結構空方主導。關注下方支撐位是否守住，若失守則空方壓力延續，建議等待結構重建再操作。`;
  } else {
    bar.className = 'direction-bar neutral';
    val.textContent = '多空觀望 NEUTRAL';
    icon.textContent = '◉';
    bias.textContent = `今日黃金區間盤整，當前價位 ${price.toFixed(2)}，多空力道相當。建議等待明確的 M15 突破訊號才進場，盤整區間內不做。`;
  }

  loadBias(price, change);
}

function loadBias(price, change) {
  const isUp = change > 0;
  document.getElementById('biasBody').innerHTML = `
    <div class="bias-point">
      <div class="bias-icon">${isUp ? '🟢' : '🔴'}</div>
      <div class="bias-text">今日整體偏向<strong style="color:${isUp ? '#34d399' : '#f87171'}">${isUp ? '多方' : '空方'}</strong>，黃金${isUp ? '上漲' : '下跌'} ${Math.abs(change).toFixed(2)} USD，動能${Math.abs(change) > 10 ? '較強' : '偏弱'}。</div>
    </div>
    <div class="bias-point">
      <div class="bias-icon">📊</div>
      <div class="bias-text">目前關注 M15 整理區間是否形成有效突破，等第一根突破、第二根回測、第三根進場。</div>
    </div>
    <div class="bias-point">
      <div class="bias-icon">⚠️</div>
      <div class="bias-text">盤整區間內 K 棒不做；重大數據前停手；連虧三筆當日停止交易。</div>
    </div>
    <div class="bias-point">
      <div class="bias-icon">🎯</div>
      <div class="bias-text">停利策略：M15 區間 1:1 爬樓梯，TP1 達到後停損移至保本，M15 走完兩層收手。</div>
    </div>
  `;

  document.getElementById('levelsBody').innerHTML = `
    <div class="zone-item">
      <span class="zone-tag zone-res">壓力</span>
      <span class="zone-price">${(price + 30).toFixed(1)}</span>
      <span class="zone-desc">近期高點壓力區</span>
    </div>
    <div class="zone-item">
      <span class="zone-tag zone-res">壓力</span>
      <span class="zone-price">${(price + 15).toFixed(1)}</span>
      <span class="zone-desc">M15 Pivot High</span>
    </div>
    <div class="zone-item">
      <span class="zone-tag zone-key">當前</span>
      <span class="zone-price">${price.toFixed(1)}</span>
      <span class="zone-desc">現價位置</span>
    </div>
    <div class="zone-item">
      <span class="zone-tag zone-sup">支撐</span>
      <span class="zone-price">${(price - 15).toFixed(1)}</span>
      <span class="zone-desc">M15 Pivot Low</span>
    </div>
    <div class="zone-item">
      <span class="zone-tag zone-sup">支撐</span>
      <span class="zone-price">${(price - 35).toFixed(1)}</span>
      <span class="zone-desc">近期低點支撐區</span>
    </div>
  `;

  loadMacro(price, change);
}

// 總經事件日曆
async function loadCalendar() {
  document.getElementById('calendarBody').innerHTML = '<div class="loading"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div></div>';
  try {
    const today = new Date();
    const from = today.toISOString().split('T')[0];
    const to = from;
    const res = await fetch(`https://finnhub.io/api/v1/calendar/economic?from=${from}&to=${to}&token=${FINNHUB_KEY}`);
    const data = await res.json();
    const events = (data.economicCalendar || []).filter(e =>
      ['USD','US'].includes(e.country) || e.unit === 'USD'
    ).slice(0, 6);

    if (events.length === 0) {
      document.getElementById('calendarBody').innerHTML = '<div style="color:#6b7a99;font-size:13px;text-align:center;padding:12px;">今日無重大美元經濟數據</div>';
      return;
    }

    let html = '';
    events.forEach(e => {
      const impact = e.impact === 'high' ? 'high' : e.impact === 'medium' ? 'medium' : 'low';
      const time = e.time ? e.time.substring(0,5) : '—';
      html += `<div class="eco-item">
        <div class="eco-time">${time}</div>
        <div class="eco-impact impact-${impact}"></div>
        <div class="eco-content">
          <div class="eco-name">${e.event || '—'}</div>
          <div class="eco-detail">預期：${e.estimate || '—'} | 前值：${e.prev || '—'}</div>
        </div>
      </div>`;
    });
    document.getElementById('calendarBody').innerHTML = html;
  } catch(e) {
    document.getElementById('calendarBody').innerHTML = '<div style="color:#6b7a99;font-size:13px;text-align:center;padding:12px;">數據載入失敗，請稍後再試</div>';
  }
}

// 黃金新聞
async function loadNews() {
  document.getElementById('newsBody').innerHTML = '<div class="loading"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div></div>';
  try {
    const res = await fetch(`https://finnhub.io/api/v1/news?category=forex&token=${FINNHUB_KEY}`);
    const data = await res.json();
    const goldNews = data.filter(n =>
      n.headline && (
        n.headline.toLowerCase().includes('gold') ||
        n.headline.toLowerCase().includes('xau') ||
        n.headline.toLowerCase().includes('fed') ||
        n.headline.toLowerCase().includes('dollar')
      )
    ).slice(0, 5);

    if (goldNews.length === 0) {
      document.getElementById('newsBody').innerHTML = '<div style="color:#6b7a99;font-size:13px;text-align:center;padding:12px;">暫無黃金相關新聞</div>';
      return;
    }

    let html = '';
    goldNews.forEach(n => {
      const time = new Date(n.datetime * 1000).toLocaleTimeString('zh-TW', { hour:'2-digit', minute:'2-digit' });
      const sent = n.sentiment || 'neutral';
      const sentLabel = sent === 'bullish' ? '利多' : sent === 'bearish' ? '利空' : '中性';
      const sentClass = sent === 'bullish' ? 'sent-bullish' : sent === 'bearish' ? 'sent-bearish' : 'sent-neutral';
      html += `<div class="news-item" onclick="window.open('${n.url}','_blank')">
        <div class="news-time">${time} · ${n.source || '—'}</div>
        <div class="news-title">${n.headline}<span class="news-sentiment ${sentClass}">${sentLabel}</span></div>
      </div>`;
    });
    document.getElementById('newsBody').innerHTML = html;
  } catch(e) {
    document.getElementById('newsBody').innerHTML = '<div style="color:#6b7a99;font-size:13px;text-align:center;padding:12px;">新聞載入失敗，請稍後再試</div>';
  }
}

function loadMacro(price, change) {
  const isUp = change > 0;
  const strength = Math.abs(change) > 15 ? '強' : Math.abs(change) > 5 ? '中等' : '弱';
  document.getElementById('macroBody').innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:16px;">
      <div style="background:var(--bg3);border-radius:10px;padding:14px;border:1px solid rgba(255,255,255,0.05);">
        <div style="font-size:10px;color:var(--text-dim);font-family:'IBM Plex Mono',monospace;letter-spacing:1px;margin-bottom:6px;">美元指數</div>
        <div style="font-size:15px;font-weight:600;color:${isUp ? '#f87171' : '#34d399'};">${isUp ? '偏弱 ▼' : '偏強 ▲'}</div>
        <div style="font-size:11px;color:var(--text-dim);margin-top:4px;">美元與黃金反向</div>
      </div>
      <div style="background:var(--bg3);border-radius:10px;padding:14px;border:1px solid rgba(255,255,255,0.05);">
        <div style="font-size:10px;color:var(--text-dim);font-family:'IBM Plex Mono',monospace;letter-spacing:1px;margin-bottom:6px;">市場風險</div>
        <div style="font-size:15px;font-weight:600;color:var(--yellow);">觀察中</div>
