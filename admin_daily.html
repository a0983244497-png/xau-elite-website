<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XAU Elite | 後台 · 今日內容</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Noto+Sans+TC:wght@300;400;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --gold:#c9a84c; --gold-light:#e8c97a; --gold-dim:rgba(201,168,76,0.15);
  --bg:#080b12; --bg2:#0d1220; --bg3:#111827; --bg4:#161d2e;
  --border:rgba(201,168,76,0.2); --border2:rgba(255,255,255,0.06);
  --text:#e8eaf0; --text-dim:#6b7a99; --text-muted:#3d4a66;
  --green:#34d399; --red:#f87171; --blue:#60a5fa; --purple:#a78bfa;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 50% at 15% 15%,rgba(201,168,76,0.04),transparent 60%);pointer-events:none;z-index:0;}

/* ── LOGIN ── */
#loginOverlay{position:fixed;inset:0;z-index:999;background:var(--bg);display:flex;align-items:center;justify-content:center;}
.login-box{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:48px 40px;width:360px;max-width:90vw;text-align:center;}
.login-logo{font-family:'Playfair Display',serif;font-size:24px;color:var(--gold);letter-spacing:2px;margin-bottom:6px;}
.login-sub{font-size:12px;color:var(--text-dim);font-family:'IBM Plex Mono',monospace;margin-bottom:32px;}
.login-label{display:block;font-size:12px;color:var(--text-dim);text-align:left;margin-bottom:8px;}
.login-input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:12px 16px;color:var(--text);font-size:14px;font-family:'IBM Plex Mono',monospace;outline:none;transition:border-color .2s;}
.login-input:focus{border-color:var(--gold);}
.login-btn{width:100%;margin-top:16px;padding:13px;background:var(--gold-dim);border:1px solid var(--border);border-radius:8px;color:var(--gold);font-size:14px;font-weight:700;font-family:'Noto Sans TC',sans-serif;cursor:pointer;letter-spacing:1px;transition:background .2s;}
.login-btn:hover{background:rgba(201,168,76,0.28);}
.login-error{margin-top:12px;font-size:12px;color:var(--red);min-height:18px;}

/* ── TOP NAV ── */
header{position:sticky;top:0;z-index:100;background:rgba(8,11,18,0.94);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 24px;height:60px;display:flex;align-items:center;gap:16px;}
.h-logo{font-family:'Playfair Display',serif;font-size:18px;color:var(--gold);letter-spacing:2px;text-decoration:none;}
.h-logo span{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text-dim);font-weight:400;margin-left:8px;}
.h-date{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text-dim);margin-left:auto;}
.h-refresh{padding:7px 14px;background:var(--gold-dim);border:1px solid var(--border);border-radius:7px;color:var(--gold);font-size:12px;font-weight:600;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:background .2s;}
.h-refresh:hover{background:rgba(201,168,76,0.3);}

/* ── LAYOUT ── */
main{max-width:960px;margin:0 auto;padding:28px 20px 60px;position:relative;z-index:1;}

/* ── SECTION HEADER ── */
.sec-head{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.sec-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.sec-icon.gold{background:rgba(201,168,76,0.12);}
.sec-icon.purple{background:rgba(167,139,250,0.12);}
.sec-icon.blue{background:rgba(96,165,250,0.12);}
.sec-title{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;color:#f0f4ff;}
.sec-badge{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;padding:3px 8px;border-radius:4px;margin-left:4px;}
.sec-badge.live{background:rgba(52,211,153,0.1);color:var(--green);border:1px solid rgba(52,211,153,0.25);}
.sec-badge.ai{background:rgba(201,168,76,0.1);color:var(--gold);border:1px solid var(--border);}
.sec-sep{height:1px;background:var(--border2);margin-bottom:24px;}

/* ── ARTICLE CARD ── */
.article-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:20px;}
.art-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--gold-light);margin-bottom:16px;line-height:1.4;}
.art-meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;}
@media(max-width:600px){.art-meta-grid{grid-template-columns:1fr;}}
.art-meta-item{background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:14px 16px;}
.art-meta-label{font-size:10px;color:var(--text-muted);font-family:'IBM Plex Mono',monospace;font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px;}
.art-meta-value{font-size:13px;color:var(--text);line-height:1.6;}
.art-meta-value.highlight{color:var(--gold);font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:600;}
.art-sep{height:1px;background:var(--border2);margin:18px 0;}
.art-full-label{font-size:11px;color:var(--text-dim);font-family:'IBM Plex Mono',monospace;font-weight:600;letter-spacing:.5px;margin-bottom:12px;}
.art-full-text{font-size:14px;color:var(--text);line-height:1.9;white-space:pre-wrap;}
.price-row{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:16px;}
.price-chip{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:8px 14px;}
.price-sym{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text-dim);font-weight:600;}
.price-val{font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:600;color:var(--text);}

/* ── ANALYSIS CARD ── */
.analysis-card{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;padding:24px;margin-bottom:16px;}
.dir-badge{display:inline-flex;align-items:center;gap:8px;padding:8px 16px;border-radius:8px;font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:700;letter-spacing:.5px;margin-bottom:16px;}
.dir-badge.bullish{background:rgba(52,211,153,0.1);border:1px solid rgba(52,211,153,0.3);color:var(--green);}
.dir-badge.bearish{background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.3);color:var(--red);}
.dir-badge.neutral{background:rgba(96,165,250,0.1);border:1px solid rgba(96,165,250,0.3);color:var(--blue);}
.bias-summary{font-size:14px;color:var(--text);line-height:1.8;margin-bottom:16px;}
.bias-points{list-style:none;display:flex;flex-direction:column;gap:8px;margin-bottom:16px;}
.bias-points li{display:flex;gap:10px;font-size:13px;color:var(--text-dim);line-height:1.7;}
.bias-points li::before{content:'▸';color:var(--gold);flex-shrink:0;margin-top:2px;}
.macro-text{font-size:13px;color:var(--text-dim);line-height:1.9;padding:14px 16px;background:var(--bg3);border-radius:9px;border-left:3px solid var(--gold);}

/* ── ECO EVENTS ── */
.eco-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:12px;}
.eco-table th{text-align:left;padding:8px 12px;font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;color:var(--text-muted);letter-spacing:.5px;border-bottom:1px solid var(--border2);}
.eco-table td{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,0.03);color:var(--text-dim);vertical-align:top;}
.eco-table td:first-child{font-family:'IBM Plex Mono',monospace;color:var(--gold);font-weight:600;white-space:nowrap;}
.eco-table tr:hover td{background:rgba(255,255,255,0.02);}

/* ── NEWS LIST ── */
.news-list{display:flex;flex-direction:column;gap:10px;margin-top:12px;}
.news-item{padding:12px 16px;background:var(--bg3);border:1px solid var(--border2);border-radius:9px;}
.news-item a{color:var(--text);text-decoration:none;font-size:13px;line-height:1.6;}
.news-item a:hover{color:var(--gold);}
.news-item-source{font-size:10px;color:var(--text-muted);font-family:'IBM Plex Mono',monospace;margin-top:4px;}

/* ── EMPTY / LOADING ── */
.empty-state{text-align:center;padding:40px;color:var(--text-muted);font-size:13px;font-family:'IBM Plex Mono',monospace;}
.loading-pulse{animation:pulse 1.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
.skeleton{background:var(--bg3);border-radius:8px;height:18px;margin-bottom:10px;animation:pulse 1.5s ease-in-out infinite;}

/* ── TABS ── */
.tab-bar{display:flex;gap:4px;background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:4px;margin-bottom:24px;}
.tab-btn{flex:1;padding:9px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--text-dim);font-family:'Noto Sans TC',sans-serif;transition:all .2s;}
.tab-btn.active{background:var(--gold-dim);color:var(--gold);border:1px solid var(--border);}
.tab-pane{display:none;}
.tab-pane.active{display:block;}
</style>
</head>
<body>

<!-- ── LOGIN OVERLAY ── -->
<div id="loginOverlay">
  <div class="login-box">
    <div class="login-logo">XAU ELITE</div>
    <div class="login-sub">ADMIN DASHBOARD</div>
    <label class="login-label">管理密碼</label>
    <input id="pwInput" type="password" class="login-input" placeholder="輸入 Admin Key" autocomplete="current-password">
    <button class="login-btn" onclick="doLogin()">進入後台</button>
    <div id="loginError" class="login-error"></div>
  </div>
</div>

<!-- ── HEADER ── -->
<header>
  <a href="/" class="h-logo">XAU ELITE <span>ADMIN</span></a>
  <div class="h-date" id="hDate"></div>
  <button class="h-refresh" onclick="loadAll()">↻ 重新整理</button>
</header>

<main>
  <!-- TABS -->
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('tab-orchestrator')">今日 Orchestrator</button>
    <button class="tab-btn" onclick="switchTab('tab-analysis')">結構分析</button>
  </div>

  <!-- ── TAB 1: Orchestrator ── -->
  <div id="tab-orchestrator" class="tab-pane active">

    <!-- 夥伴4 文章 -->
    <div class="sec-head">
      <div class="sec-icon gold">📊</div>
      <div>
        <div class="sec-title">夥伴4 · 市場分析文章</div>
      </div>
      <span class="sec-badge ai">GPT-4o</span>
    </div>
    <div class="sec-sep"></div>
    <div id="articleSection"></div>

  </div>

  <!-- ── TAB 2: 結構分析 ── -->
  <div id="tab-analysis" class="tab-pane">
    <div class="sec-head">
      <div class="sec-icon blue">🔍</div>
      <div>
        <div class="sec-title">今日結構分析</div>
      </div>
      <span class="sec-badge live">即時</span>
    </div>
    <div class="sec-sep"></div>
    <div id="analysisSection"></div>
  </div>
</main>

<script>
const ADMIN_KEY = sessionStorage.getItem('adminKey') || '';

// ── 登入 ──────────────────────────────────────────────────
function doLogin() {
  const pw = document.getElementById('pwInput').value.trim();
  if (!pw) { showLoginError('請輸入密碼'); return; }
  // 用 admin endpoint 驗證
  fetch('/api/orchestrator/trigger', {
    method: 'POST',
    headers: { 'X-Admin-Key': pw }
  }).then(r => {
    if (r.ok || r.status !== 401) {
      sessionStorage.setItem('adminKey', pw);
      document.getElementById('loginOverlay').style.display = 'none';
      loadAll();
    } else {
      showLoginError('密碼錯誤，請再試');
    }
  }).catch(() => {
    // 網路錯誤也當作密碼正確（offline mode）
    sessionStorage.setItem('adminKey', pw);
    document.getElementById('loginOverlay').style.display = 'none';
    loadAll();
  });
}
document.getElementById('pwInput').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
function showLoginError(msg) { document.getElementById('loginError').textContent = msg; }

// 已有 session 則自動跳過登入
if (ADMIN_KEY) {
  document.getElementById('loginOverlay').style.display = 'none';
}

// ── 日期 ──────────────────────────────────────────────────
function setDate() {
  const d = new Date();
  document.getElementById('hDate').textContent =
    d.toLocaleDateString('zh-TW', { year:'numeric', month:'long', day:'numeric', weekday:'short' });
}
setDate();

// ── TABS ──────────────────────────────────────────────────
function switchTab(id) {
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  event.currentTarget.classList.add('active');
}

// ── 載入 Orchestrator 資料 ────────────────────────────────
async function loadOrchestratorData() {
  document.getElementById('articleSection').innerHTML = skeletonHTML();
  try {
    const r = await fetch('/api/daily-content');
    const d = await r.json();
    renderArticle(d.article);
  } catch (e) {
    document.getElementById('articleSection').innerHTML = emptyHTML('無法載入文章');
  }
}

function renderArticle(a) {
  if (!a) {
    document.getElementById('articleSection').innerHTML =
      emptyHTML('今日尚未產出文章，可手動觸發 Orchestrator');
    return;
  }
  const xauDir = (a.xau_price && a.xau_change_pct) ?
    `<span class="price-chip"><span class="price-sym">XAU/USD</span><span class="price-val">${a.xau_price}</span></span>` : '';
  const dxyDir = a.dxy_price ?
    `<span class="price-chip"><span class="price-sym">DXY</span><span class="price-val">${a.dxy_price}</span></span>` : '';

  document.getElementById('articleSection').innerHTML = `
    <div class="article-card">
      <div class="art-title">${a.title || '—'}</div>
      <div class="price-row">${xauDir}${dxyDir}</div>
      <div class="art-meta-grid">
        <div class="art-meta-item">
          <div class="art-meta-label">行情摘要</div>
          <div class="art-meta-value">${a.market_status || '—'}</div>
        </div>
        <div class="art-meta-item">
          <div class="art-meta-label">關鍵價位</div>
          <div class="art-meta-value highlight">${a.key_levels || '—'}</div>
        </div>
        <div class="art-meta-item">
          <div class="art-meta-label">操盤方向</div>
          <div class="art-meta-value">${a.gino_strategy || '—'}</div>
        </div>
        <div class="art-meta-item">
          <div class="art-meta-label">本週重點</div>
          <div class="art-meta-value">${a.weekly_notes || '—'}</div>
        </div>
      </div>
      ${a.full_content ? `
      <div class="art-sep"></div>
      <div class="art-full-label">完整文章</div>
      <div class="art-full-text">${escHtml(a.full_content)}</div>` : ''}
    </div>`;
}

// ── 載入結構分析 ──────────────────────────────────────────
async function loadAnalysis() {
  document.getElementById('analysisSection').innerHTML = skeletonHTML();
  try {
    const r = await fetch('/api/daily_analysis');
    const d = await r.json();
    if (!d.ok) throw new Error(d.error);
    renderAnalysis(d);
  } catch (e) {
    document.getElementById('analysisSection').innerHTML = emptyHTML('無法載入今日分析');
  }
}

function renderAnalysis(d) {
  const dirClass = d.direction === 'bullish' ? 'bullish' : d.direction === 'bearish' ? 'bearish' : 'neutral';
  const dirLabel = d.direction_text || d.direction || '—';
  const points = (d.bias_points || []).map(p => `<li>${escHtml(p)}</li>`).join('');
  const eco = renderEco(d.eco_events || []);
  const news = renderNews(d.news_items || []);

  document.getElementById('analysisSection').innerHTML = `
    <div class="analysis-card">
      <div class="dir-badge ${dirClass}">${dirLabel}</div>
      <div class="bias-summary">${escHtml(d.bias_summary || '')}</div>
      ${points ? `<ul class="bias-points">${points}</ul>` : ''}
      ${d.macro_text ? `<div class="macro-text">${escHtml(d.macro_text)}</div>` : ''}
    </div>
    ${eco}
    ${news}`;
}

function renderEco(events) {
  if (!events.length) return '';
  const rows = events.map(e => {
    const rawT = e.time || e.date || '';
    let display = '—';
    if (rawT.includes('T')) {
      const [dp, tp] = rawT.split('T');
      display = dp.slice(5) + ' ' + (tp||'').substring(0,5);
    } else if (/^\d{4}-\d{2}-\d{2}$/.test(rawT)) {
      display = rawT.slice(5);
    } else if (rawT) {
      display = rawT.substring(0,5);
    }
    return `<tr><td>${display}</td><td>${escHtml(e.event||'')}</td><td>${e.actual||'—'}</td><td>${e.estimate||'—'}</td></tr>`;
  }).join('');
  return `
    <div class="analysis-card">
      <div class="art-full-label">今日重大事件</div>
      <table class="eco-table">
        <thead><tr><th>時間</th><th>事件</th><th>實際</th><th>預期</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

function renderNews(items) {
  if (!items.length) return '';
  const list = items.slice(0,6).map(n => `
    <div class="news-item">
      <a href="${n.url||'#'}" target="_blank" rel="noopener">${escHtml(n.headline||n.title||'')}</a>
      <div class="news-item-source">${n.source||'Finnhub'}</div>
    </div>`).join('');
  return `
    <div class="analysis-card">
      <div class="art-full-label">市場新聞</div>
      <div class="news-list">${list}</div>
    </div>`;
}

// ── 工具 ──────────────────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function skeletonHTML() {
  return `<div class="article-card">
    <div class="skeleton" style="height:24px;width:55%;"></div>
    <div class="skeleton" style="height:14px;width:80%;"></div>
    <div class="skeleton" style="height:14px;width:65%;"></div>
  </div>`;
}
function emptyHTML(msg) {
  return `<div class="empty-state loading-pulse">${msg}</div>`;
}

async function loadAll() {
  await Promise.all([loadOrchestratorData(), loadAnalysis()]);
}

// 已登入則立刻載入
if (ADMIN_KEY) loadAll();
</script>
</body>
</html>
