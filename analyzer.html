<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XAU Elite | AI 圖表分析</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Noto+Sans+TC:wght@300;400;500&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #c9a84c;
  --gold-bg: rgba(201,168,76,0.1);
  --bg: #070b14;
  --bg2: rgba(255,255,255,0.04);
  --border: rgba(201,168,76,0.15);
  --border2: rgba(255,255,255,0.06);
  --text: #dde2ef;
  --muted: #5c6b8a;
  --green: #34d399;
  --red: #f87171;
  --yellow: #fbbf24;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans TC', sans-serif;
  min-height: 100vh;
  font-size: 15px;
  line-height: 1.6;
}

/* ── Nav ── */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 50;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 32px; height: 60px;
  background: rgba(7,11,20,0.92); backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
}
.logo { font-family: 'Playfair Display', serif; font-size: 17px; font-weight: 700; color: var(--gold); text-decoration: none; letter-spacing: 2px; }
.back-btn { font-size: 12px; font-family: 'IBM Plex Mono', monospace; color: var(--muted); text-decoration: none; padding: 6px 14px; border: 1px solid var(--border2); border-radius: 6px; transition: color .2s, border-color .2s; }
.back-btn:hover { color: var(--gold); border-color: var(--border); }

/* ── Layout ── */
main {
  max-width: 680px;
  margin: 0 auto;
  padding: 80px 20px 60px;
}

/* ── States ── */
.state { display: none; }
.state.visible { display: block; }

/* ── Upload State ── */
.page-header { text-align: center; margin-bottom: 36px; }
.page-header h1 { font-family: 'Playfair Display', serif; font-size: 30px; font-weight: 700; color: #eef0f8; margin-bottom: 10px; }
.page-header p { color: var(--muted); font-size: 14px; line-height: 1.8; }

.upload-area {
  border: 2px dashed rgba(201,168,76,0.25);
  border-radius: 18px;
  padding: 64px 32px;
  text-align: center;
  cursor: pointer;
  transition: border-color .25s, background .25s;
  background: var(--bg2);
}
.upload-area:hover, .upload-area.drag-over {
  border-color: var(--gold);
  background: rgba(201,168,76,0.05);
}
.upload-icon { font-size: 48px; margin-bottom: 18px; opacity: .8; }
.upload-main { font-size: 16px; font-weight: 500; color: var(--text); margin-bottom: 8px; }
.upload-sub { font-size: 12px; color: var(--muted); font-family: 'IBM Plex Mono', monospace; }

/* ── Preview State ── */
.preview-img {
  width: 100%; border-radius: 14px; display: block;
  max-height: 340px; object-fit: contain;
  background: #000; border: 1px solid var(--border2);
}
.preview-actions {
  display: flex; gap: 12px; margin-top: 14px;
}
.btn-ghost {
  padding: 10px 20px; background: transparent; border: 1px solid var(--border2);
  border-radius: 9px; color: var(--muted); font-size: 13px; cursor: pointer;
  font-family: 'IBM Plex Mono', monospace; transition: all .2s;
}
.btn-ghost:hover { border-color: var(--border); color: var(--text); }
.btn-gold {
  flex: 1; padding: 12px 20px;
  background: linear-gradient(135deg, var(--gold), #a07830);
  border: none; border-radius: 9px;
  color: #07090f; font-size: 15px; font-weight: 700;
  cursor: pointer; font-family: 'Noto Sans TC', sans-serif;
  transition: opacity .2s; letter-spacing: .5px;
}
.btn-gold:hover:not(:disabled) { opacity: .85; }
.btn-gold:disabled { opacity: .45; cursor: not-allowed; background: #2a3040; color: #4a5568; }

/* ── Loading State ── */
.loading-img {
  width: 100%; border-radius: 14px; display: block;
  max-height: 200px; object-fit: contain;
  background: #000; border: 1px solid var(--border2);
  opacity: .45; filter: grayscale(.4);
  margin-bottom: 20px;
}
.steps-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 14px; padding: 28px 28px 24px;
}
.steps-title {
  font-size: 11px; font-weight: 600; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--muted);
  font-family: 'IBM Plex Mono', monospace; margin-bottom: 20px;
}
.step {
  display: flex; align-items: center; gap: 12px;
  padding: 8px 0; font-size: 14px; color: var(--muted);
  opacity: 0; transform: translateY(5px);
  transition: opacity .4s, transform .4s, color .3s;
}
.step.active { opacity: 1; transform: translateY(0); color: var(--text); }
.step.done { opacity: 1; transform: translateY(0); color: var(--green); }
.step.final { opacity: 1; transform: translateY(0); color: var(--gold); font-weight: 500; }
.si { font-size: 18px; width: 26px; text-align: center; flex-shrink: 0; }
.st { flex: 1; }
.ss { width: 18px; text-align: center; font-size: 13px; color: var(--green); }
@keyframes spin { to { transform: rotate(360deg); } }
.spin-icon {
  display: inline-block; width: 13px; height: 13px;
  border: 2px solid rgba(201,168,76,.3); border-top-color: var(--gold);
  border-radius: 50%; animation: spin .7s linear infinite;
}

/* ── Result State ── */
.result-top {
  display: flex; align-items: center; gap: 14px; margin-bottom: 20px;
}
.result-thumb {
  width: 90px; height: 64px; object-fit: cover; border-radius: 8px;
  border: 1px solid var(--border2); flex-shrink: 0;
}
.btn-sm { padding: 7px 14px; font-size: 12px; }
.result-hint { font-size: 13px; color: var(--muted); }

/* Direction card */
.dir-card {
  border-radius: 14px; padding: 24px 24px 20px;
  border: 1px solid transparent; margin-bottom: 14px;
  animation: fadeup .4s ease;
}
.dir-card.bullish { background: rgba(52,211,153,.07); border-color: rgba(52,211,153,.2); }
.dir-card.bearish { background: rgba(248,113,113,.07); border-color: rgba(248,113,113,.2); }
.dir-card.neutral { background: rgba(251,191,36,.07); border-color: rgba(251,191,36,.2); }
.dir-main { font-size: 22px; font-weight: 700; font-family: 'Playfair Display', serif; margin-bottom: 8px; }
.dir-card.bullish .dir-main { color: var(--green); }
.dir-card.bearish .dir-main { color: var(--red); }
.dir-card.neutral .dir-main { color: var(--yellow); }
.dir-reason { font-size: 13px; color: var(--muted); line-height: 1.7; }

/* Levels */
.levels-row {
  display: grid; grid-template-columns: 1fr 1fr 1fr;
  gap: 10px; margin-bottom: 14px;
  animation: fadeup .4s .08s both;
}
.level-chip {
  background: var(--bg2); border: 1px solid var(--border2);
  border-radius: 10px; padding: 14px 16px; text-align: center;
}
.level-label {
  font-size: 10px; font-weight: 600; letter-spacing: 1px;
  text-transform: uppercase; color: var(--muted);
  font-family: 'IBM Plex Mono', monospace; margin-bottom: 7px;
}
.level-val {
  font-size: 15px; font-weight: 600;
  font-family: 'IBM Plex Mono', monospace; color: var(--text);
}
.level-chip.resistance .level-val { color: var(--red); }
.level-chip.range .level-val { color: var(--gold); font-size: 13px; }
.level-chip.support .level-val { color: var(--green); }

/* Info cards */
.info-card {
  background: var(--bg2); border: 1px solid var(--border2);
  border-radius: 12px; padding: 20px 22px; margin-bottom: 12px;
  animation: fadeup .4s .15s both;
}
.info-label {
  font-size: 11px; font-weight: 600; letter-spacing: 1.2px;
  text-transform: uppercase; color: var(--muted);
  font-family: 'IBM Plex Mono', monospace; margin-bottom: 12px;
}
.info-body { font-size: 13px; color: #9ba8bf; line-height: 1.85; white-space: pre-line; }

/* Chat */
.chat-section {
  margin-top: 28px; border-top: 1px solid var(--border2);
  padding-top: 24px; animation: fadeup .4s .2s both;
}
.chat-title {
  font-size: 13px; color: var(--muted); margin-bottom: 16px;
  font-family: 'IBM Plex Mono', monospace;
}
.chat-messages { display: flex; flex-direction: column; gap: 14px; margin-bottom: 16px; }
.bubble {
  max-width: 86%; padding: 12px 16px;
  border-radius: 13px; font-size: 14px; line-height: 1.75;
}
.bubble-user {
  align-self: flex-end;
  background: var(--gold-bg); border: 1px solid rgba(201,168,76,.2);
  color: var(--text); border-radius: 13px 13px 3px 13px;
}
.bubble-ai {
  align-self: flex-start;
  background: var(--bg2); border: 1px solid var(--border2);
  color: #9ba8bf; border-radius: 3px 13px 13px 13px;
}
@keyframes blink { 0%,100%{opacity:1}50%{opacity:0} }
.cursor { display: inline-block; width: 2px; height: 14px; background: var(--gold); animation: blink 1s step-end infinite; vertical-align: middle; margin-left: 1px; }
.chat-input-row { display: flex; gap: 10px; }
.chat-input {
  flex: 1; background: var(--bg2); border: 1px solid var(--border2);
  border-radius: 9px; padding: 11px 16px; font-size: 14px;
  font-family: 'Noto Sans TC', sans-serif; color: var(--text); outline: none;
  transition: border-color .2s;
}
.chat-input:focus { border-color: var(--border); }
.chat-input::placeholder { color: var(--muted); }
.chat-send {
  padding: 11px 20px; background: var(--gold-bg); border: 1px solid var(--border);
  border-radius: 9px; color: var(--gold); font-size: 13px; cursor: pointer;
  font-family: 'IBM Plex Mono', monospace; white-space: nowrap; transition: all .2s;
}
.chat-send:hover:not(:disabled) { background: rgba(201,168,76,.18); }
.chat-send:disabled { opacity: .4; cursor: not-allowed; }

@keyframes fadeup { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
.disclaimer {
  text-align: center; font-size: 11px; color: var(--muted);
  font-family: 'IBM Plex Mono', monospace; margin-top: 32px; line-height: 1.8;
}
@media (max-width: 600px) {
  nav { padding: 0 18px; }
  main { padding: 72px 14px 40px; }
  .upload-area { padding: 44px 20px; }
  .levels-row { grid-template-columns: 1fr; }
  .dir-main { font-size: 18px; }
  .result-thumb { width: 72px; height: 52px; }
}
</style>
</head>
<body>

<nav>
  <a class="logo" href="/">XAU ELITE</a>
  <a class="back-btn" href="/">← 返回首頁</a>
</nav>

<main>

  <!-- ── STATE: Upload ── -->
  <div id="s-upload" class="state visible">
    <div class="page-header">
      <h1>AI 圖表分析</h1>
      <p>上傳 XAU/USD K 線截圖<br>AI 自動判斷方向、關鍵位與進場建議</p>
    </div>
    <div id="uploadArea" class="upload-area">
      <input type="file" id="fileInput" accept="image/*" style="display:none">
      <div class="upload-icon">📷</div>
      <div class="upload-main">拖曳截圖到此處</div>
      <div class="upload-sub">或點擊上傳 · JPG / PNG · 自動壓縮加速</div>
    </div>
    <div class="disclaimer">⚠ 本工具僅供教育用途，不構成投資建議</div>
  </div>

  <!-- ── STATE: Preview ── -->
  <div id="s-preview" class="state">
    <img id="previewImg" class="preview-img" alt="">
    <div class="preview-actions">
      <button class="btn-ghost" onclick="resetToUpload()">← 換張圖</button>
      <button class="btn-gold" id="analyzeBtn" onclick="startAnalysis()">🔍 開始 AI 分析</button>
    </div>
  </div>

  <!-- ── STATE: Loading ── -->
  <div id="s-loading" class="state">
    <img id="loadingImg" class="loading-img" alt="">
    <div class="steps-card">
      <div class="steps-title">AI 正在分析圖表</div>
      <div id="stepsList"></div>
    </div>
  </div>

  <!-- ── STATE: Result ── -->
  <div id="s-result" class="state">
    <div class="result-top">
      <img id="resultImg" class="result-thumb" alt="">
      <span class="result-hint">分析完成</span>
      <button class="btn-ghost btn-sm" style="margin-left:auto" onclick="resetToUpload()">← 重新上傳</button>
    </div>

    <div id="dirCard" class="dir-card neutral">
      <div id="dirMain" class="dir-main"></div>
      <div id="dirReason" class="dir-reason"></div>
    </div>

    <div id="levelsRow" class="levels-row"></div>

    <div class="info-card" id="sopCard" style="display:none">
      <div class="info-label">📋 破框 SOP</div>
      <div id="sopText" class="info-body"></div>
    </div>

    <div class="info-card" id="riskCard" style="display:none">
      <div class="info-label">⚠️ 風險提示</div>
      <div id="riskText" class="info-body"></div>
    </div>

    <div id="chatSection" class="chat-section">
      <div class="chat-title">還有問題嗎？輸入繼續討論這張圖</div>
      <div id="chatMessages" class="chat-messages"></div>
      <div class="chat-input-row">
        <input id="chatInput" class="chat-input" type="text" placeholder="例：這個支撐位可以進場嗎？">
        <button class="chat-send" id="chatSendBtn" onclick="sendChat()">送出 →</button>
      </div>
    </div>
  </div>

</main>

<script>
// ── State ───────────────────────────────────────────────
let imgData = null;       // compressed data URL
let imgMediaType = 'image/jpeg';
let analysisText = '';    // full raw text from AI
let chatHistory = [];     // [{role, content}, ...]
let chatBusy = false;

function showState(id) {
  document.querySelectorAll('.state').forEach(el => el.classList.remove('visible'));
  document.getElementById(id).classList.add('visible');
}

function resetToUpload() {
  imgData = null; analysisText = ''; chatHistory = [];
  document.getElementById('fileInput').value = '';
  document.getElementById('chatMessages').innerHTML = '';
  showState('s-upload');
}

// ── Image compression ────────────────────────────────────
async function compressImage(file) {
  return new Promise(resolve => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      URL.revokeObjectURL(url);
      const MAX = 800;
      let w = img.width, h = img.height;
      if (w > MAX || h > MAX) {
        if (w >= h) { h = Math.round(h * MAX / w); w = MAX; }
        else { w = Math.round(w * MAX / h); h = MAX; }
      }
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(c.toDataURL('image/jpeg', 0.85));
    };
    img.onerror = () => { URL.revokeObjectURL(url); resolve(null); };
    img.src = url;
  });
}

// ── Upload handlers ──────────────────────────────────────
const uploadArea = document.getElementById('uploadArea');
const fileInput  = document.getElementById('fileInput');

uploadArea.addEventListener('click', () => fileInput.click());
uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('drag-over'); });
uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('drag-over'));
uploadArea.addEventListener('drop', e => {
  e.preventDefault(); uploadArea.classList.remove('drag-over');
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });

async function handleFile(file) {
  if (!file.type.startsWith('image/')) { alert('請上傳圖片檔案（JPG / PNG）'); return; }
  if (file.size > 15 * 1024 * 1024) { alert('圖片不能超過 15MB'); return; }
  imgMediaType = 'image/jpeg';
  const compressed = await compressImage(file);
  if (!compressed) { alert('圖片讀取失敗，請重試'); return; }
  imgData = compressed;
  document.getElementById('previewImg').src = imgData;
  document.getElementById('analyzeBtn').disabled = false;
  document.getElementById('analyzeBtn').textContent = '🔍 開始 AI 分析';
  showState('s-preview');
}

// ── Loading steps ────────────────────────────────────────
const STEP_DEFS = [
  { icon: '📊', text: '正在讀取圖表結構...' },
  { icon: '🔍', text: '識別關鍵撐壓位...' },
  { icon: '⚡', text: '套用 XAU Elite 破框策略...' },
];

let _streamDone = false;
let _minTimeDone = false;
let _stepTimers = [];

function runSteps() {
  _streamDone = false; _minTimeDone = false;
  _stepTimers.forEach(clearTimeout); _stepTimers = [];
  const list = document.getElementById('stepsList');
  list.innerHTML = '';

  STEP_DEFS.forEach((def, i) => {
    const el = document.createElement('div');
    el.className = 'step'; el.id = 'step_' + i;
    el.innerHTML = `<span class="si">${def.icon}</span><span class="st">${def.text}</span><span class="ss"></span>`;
    list.appendChild(el);
    _stepTimers.push(setTimeout(() => {
      el.classList.add('active');
      el.querySelector('.ss').innerHTML = '<span class="spin-icon"></span>';
    }, i * 2100));
    if (i < STEP_DEFS.length - 1) {
      _stepTimers.push(setTimeout(() => markDone(i), (i + 1) * 2100));
    }
  });
  _stepTimers.push(setTimeout(() => { _minTimeDone = true; tryFinish(); }, STEP_DEFS.length * 2100));
}

function markDone(i) {
  const el = document.getElementById('step_' + i);
  if (!el) return;
  el.classList.replace('active', 'done');
  el.querySelector('.ss').textContent = '✓';
}

function tryFinish() {
  if (!_streamDone || !_minTimeDone) return;
  // Complete remaining active steps
  for (let i = 0; i < STEP_DEFS.length; i++) markDone(i);
  // Add success step
  const list = document.getElementById('stepsList');
  const el = document.createElement('div');
  el.className = 'step final';
  el.innerHTML = '<span class="si">✅</span><span class="st">分析完成！</span>';
  setTimeout(() => {
    el.style.opacity = '0';
    el.style.transform = 'translateY(5px)';
    list.appendChild(el);
    requestAnimationFrame(() => {
      el.style.transition = 'opacity .4s, transform .4s';
      el.style.opacity = '1'; el.style.transform = 'translateY(0)';
    });
  }, 200);
  setTimeout(() => { renderResult(); showState('s-result'); }, 900);
}

// ── Main analysis ────────────────────────────────────────
async function startAnalysis() {
  if (!imgData) return;
  const btn = document.getElementById('analyzeBtn');
  btn.disabled = true; btn.textContent = '⏳ 分析中...';
  analysisText = '';

  document.getElementById('loadingImg').src = imgData;
  showState('s-loading');
  runSteps();

  try {
    const resp = await fetch('/api/analyze-chart', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ image: imgData, media_type: imgMediaType })
    });
    if (!resp.ok) {
      const e = await resp.json().catch(() => ({}));
      throw new Error(e.error || `HTTP ${resp.status}`);
    }
    await readSSE(resp, chunk => { analysisText += chunk; });
  } catch (e) {
    _streamDone = true; _minTimeDone = true;
    analysisText = `【方向】\n多空觀望 NEUTRAL ◉\n無法讀取圖表，請重試\n\n【關鍵位】\n壓力：—\n區間：—\n支撐：—\n\n【破框SOP】\n❌ 分析失敗：${e.message}\n\n【風險提示】\n• 請確認圖片清晰並包含 K 線\n• 建議使用截圖工具重新截取`;
    _streamDone = true;
    tryFinish();
    return;
  }

  _streamDone = true;
  tryFinish();
}

// ── SSE reader ───────────────────────────────────────────
async function readSSE(response, onChunk) {
  const reader = response.body.getReader();
  const dec = new TextDecoder();
  let buf = '';
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buf += dec.decode(value, { stream: true });
    const lines = buf.split('\n');
    buf = lines.pop();
    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      const payload = line.slice(6).trim();
      if (payload === '[DONE]') return;
      try {
        const d = JSON.parse(payload);
        if (d.error) throw new Error(d.error);
        if (d.text) onChunk(d.text);
      } catch (ex) { /* partial JSON */ }
    }
  }
}

// ── Parse & render result ────────────────────────────────
function extractSection(text, key) {
  const re = new RegExp(`【${key}[^】]*】\\s*([\\s\\S]*?)(?=【|$)`);
  const m = text.match(re);
  return m ? m[1].trim() : '';
}

function renderResult() {
  const dir  = extractSection(analysisText, '方向');
  const lev  = extractSection(analysisText, '關鍵位');
  const sop  = extractSection(analysisText, '破框SOP');
  const risk = extractSection(analysisText, '風險提示');

  // Direction
  const lines = dir.split('\n').filter(l => l.trim());
  const d0 = lines[0] || '';
  const reason = lines.slice(1).join(' ').trim();
  const card = document.getElementById('dirCard');
  card.className = 'dir-card ' + (
    d0.includes('BULLISH') || d0.includes('多方') ? 'bullish' :
    d0.includes('BEARISH') || d0.includes('空方') ? 'bearish' : 'neutral'
  );
  document.getElementById('dirMain').textContent = d0 || '分析結果';
  document.getElementById('dirReason').textContent = reason;

  // Levels
  const pressM = lev.match(/壓力[：:]\s*(.+)/);
  const rangeM = lev.match(/區間[：:]\s*(.+)/);
  const suppM  = lev.match(/支撐[：:]\s*(.+)/);
  const row = document.getElementById('levelsRow');
  row.innerHTML = '';
  if (pressM || rangeM || suppM) {
    const chips = [
      { cls: 'resistance', label: '上方壓力', val: pressM?.[1]?.trim() || '—' },
      { cls: 'range',      label: '整理區間', val: rangeM?.[1]?.trim() || '—' },
      { cls: 'support',    label: '下方支撐', val: suppM?.[1]?.trim() || '—' },
    ];
    chips.forEach(c => {
      const el = document.createElement('div');
      el.className = `level-chip ${c.cls}`;
      el.innerHTML = `<div class="level-label">${c.label}</div><div class="level-val">${esc(c.val)}</div>`;
      row.appendChild(el);
    });
  }

  // SOP
  if (sop) {
    document.getElementById('sopText').textContent = sop;
    document.getElementById('sopCard').style.display = '';
  }

  // Risk
  if (risk) {
    document.getElementById('riskText').textContent = risk;
    document.getElementById('riskCard').style.display = '';
  }

  // Thumbnail
  document.getElementById('resultImg').src = imgData;

  // Reset chat
  chatHistory = [];
  document.getElementById('chatMessages').innerHTML = '';
  document.getElementById('chatInput').value = '';
}

function esc(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Chat ─────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('chatInput').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
  });
});

async function sendChat() {
  if (chatBusy) return;
  const input = document.getElementById('chatInput');
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';
  chatBusy = true;
  document.getElementById('chatSendBtn').disabled = true;

  addBubble(msg, 'user');
  chatHistory.push({ role: 'user', content: msg });

  const aiBubble = addBubble('', 'ai');
  const cursor = document.createElement('span');
  cursor.className = 'cursor';
  aiBubble.appendChild(cursor);

  let reply = '';
  try {
    const resp = await fetch('/api/chat-chart', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        image: imgData,
        media_type: imgMediaType,
        analysis: analysisText,
        history: chatHistory.slice(0, -1),
        message: msg
      })
    });
    if (!resp.ok) {
      const e = await resp.json().catch(() => ({}));
      throw new Error(e.error || `HTTP ${resp.status}`);
    }
    await readSSE(resp, chunk => {
      reply += chunk;
      cursor.remove();
      aiBubble.textContent = reply;
      aiBubble.appendChild(cursor);
      aiBubble.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    });
  } catch (e) {
    reply = `❌ 錯誤：${e.message}`;
    aiBubble.textContent = reply;
  } finally {
    cursor.remove();
    chatHistory.push({ role: 'assistant', content: reply });
    chatBusy = false;
    document.getElementById('chatSendBtn').disabled = false;
    document.getElementById('chatInput').focus();
  }
}

function addBubble(text, role) {
  const wrap = document.createElement('div');
  wrap.className = `bubble bubble-${role}`;
  wrap.textContent = text;
  document.getElementById('chatMessages').appendChild(wrap);
  wrap.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  return wrap;
}
</script>
