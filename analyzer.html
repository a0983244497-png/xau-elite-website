<style>
:root {
  --gold: #c9a84c;
  --gold-bg: rgba(201,168,76,0.1);
  --bg: #070b14;
  --bg2: rgba(255,255,255,0.04);
  --border: rgba(201,168,76,0.18);
  --border2: rgba(255,255,255,0.07);
  --text: #dde2ef;
  --muted: #5c6b8a;
  --green: #34d399;
  --red: #f87171;
  --yellow: #fbbf24;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans TC', sans-serif;
  min-height: 100vh;
  font-size: 15px;
}

/* Nav */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 50;
  display: flex; align-items: center; gap: 24px;
  padding: 0 32px; height: 64px;
  background: rgba(7,11,20,0.92); backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
}
.logo { font-family: 'Playfair Display', serif; font-size: 19px; font-weight: 700; color: var(--gold); text-decoration: none; letter-spacing: 2px; white-space: nowrap; flex-shrink: 0; }
.logo span { color: var(--muted); font-weight: 400; font-size: 12px; margin-left: 8px; font-family: 'IBM Plex Mono', monospace; letter-spacing: 1px; }
.nav-links { display: flex; align-items: center; gap: 2px; flex: 1; list-style: none; }
.nav-link { padding: 6px 14px; border-radius: 6px; font-size: 13px; font-weight: 500; color: var(--muted); text-decoration: none; transition: all 0.2s; white-space: nowrap; }
.nav-link:hover, .nav-link.active { color: var(--gold); background: rgba(201,168,76,0.12); }
.nav-apply-btn { padding: 7px 18px; background: rgba(201,168,76,0.15); border: 1px solid var(--border); border-radius: 8px; color: var(--gold); font-size: 13px; font-weight: 600; text-decoration: none; white-space: nowrap; margin-left: auto; flex-shrink: 0; }
.nav-apply-btn:hover { background: rgba(201,168,76,0.28); }
.back-btn { font-size: 12px; font-family: 'IBM Plex Mono', monospace; color: var(--muted); text-decoration: none; padding: 6px 14px; border: 1px solid var(--border2); border-radius: 6px; transition: color .2s, border-color .2s; display: none; }

/* Layout */
main { max-width: 640px; margin: 0 auto; padding: 80px 20px 60px; }

/* States */
.state { display: none; }
.state.visible { display: block; }

/* ── Upload ── */
.page-header { text-align: center; margin-bottom: 36px; }
.page-header h1 { font-family: 'Playfair Display', serif; font-size: 30px; font-weight: 700; color: #eef0f8; margin-bottom: 10px; }
.page-header p { color: var(--muted); font-size: 14px; line-height: 1.8; }

.upload-area {
  border: 2px dashed rgba(201,168,76,0.25); border-radius: 18px;
  padding: 64px 32px; text-align: center; cursor: pointer;
  transition: border-color .25s, background .25s; background: var(--bg2);
}
.upload-area:hover, .upload-area.drag-over { border-color: var(--gold); background: rgba(201,168,76,0.05); }
.upload-icon { font-size: 48px; margin-bottom: 16px; opacity: .8; }
.upload-main { font-size: 16px; font-weight: 500; color: var(--text); margin-bottom: 8px; }
.upload-sub { font-size: 12px; color: var(--muted); font-family: 'IBM Plex Mono', monospace; }

/* ── Preview ── */
.preview-img {

  max-height: 340px; object-fit: contain;

}
.preview-actions { display: flex; gap: 10px; margin-top: 14px; }
.btn-ghost {

  border-radius: 9px; color: var(--muted); font-size: 13px; cursor: pointer;

  border: none; border-radius: 9px; color: #07090f;

/* ── Loading ── */
.loading-img {
  width: 100%; border-radius: 14px; display: block;
  max-height: 200px; object-fit: contain;
  background: #000; border: 1px solid var(--border2);
  opacity: .4; filter: grayscale(.4); margin-bottom: 20px;
}
.steps-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 14px; padding: 28px 28px 24px;
}
.steps-title {
  font-size: 11px; font-weight: 600; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--muted);
  font-family: 'IBM Plex Mono', monospace; margin-bottom: 20px;
}
.step {
  display: flex; align-items: center; gap: 12px;

  opacity: 0; transform: translateY(5px);
  transition: opacity .4s, transform .4s, color .3s;

.step.active { opacity: 1; transform: translateY(0); color: var(--text); }
.step.done { opacity: 1; transform: translateY(0); color: var(--green); }

.spin-icon {

}

.result-top {

}
.result-thumb {

.result-meta { font-size: 12px; color: var(--muted); font-family: 'IBM Plex Mono', monospace; }

/* Result card */
.result-card {

/* Direction header */
.dir-header {

.dir-header.bullish { background: rgba(52,211,153,.09); border-bottom-color: rgba(52,211,153,.15); }
.dir-header.bearish { background: rgba(248,113,113,.09); border-bottom-color: rgba(248,113,113,.15); }
.dir-header.neutral { background: rgba(251,191,36,.07); border-bottom-color: rgba(251,191,36,.12); }

.dir-header.bullish .dir-label { color: var(--green); }

.dir-header.neutral .dir-label { color: var(--yellow); }
.dir-sub { font-size: 13px; color: var(--muted); margin-top: 5px; line-height: 1.5; }

/* Levels table */
.levels-table { border-bottom: 1px solid var(--border2); }
.level-row {
  display: flex; align-items: center;
  padding: 12px 24px; border-bottom: 1px solid rgba(255,255,255,0.03);
}
.level-row:last-child { border-bottom: none; }
.level-name {

/* SOP + Risk sections */
.result-section { padding: 18px 24px; border-bottom: 1px solid rgba(255,255,255,0.04); }

/* No-trade warning */
.notrade-box {

.notrade-title {

.disclaimer {

@keyframes fadeup { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

@media (max-width: 600px) {

<script>
// ── State ────────────────────────────────────────────────
let imgData = null;
let imgMediaType = 'image/jpeg';
let analysisText = '';

function showState(id) {
  document.querySelectorAll('.state').forEach(el => el.classList.remove('visible'));
  document.getElementById(id).classList.add('visible');
}

function resetToUpload() {
  imgData = null; analysisText = '';
  document.getElementById('fileInput').value = '';
  showState('s-upload');
}

// ── Image compression ────────────────────────────────────
async function compressImage(file) {
  return new Promise(resolve => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      URL.revokeObjectURL(url);
      const MAX = 1200;
      let w = img.width, h = img.height;
      if (w > MAX || h > MAX) {
        if (w >= h) { h = Math.round(h * MAX / w); w = MAX; }
        else { w = Math.round(w * MAX / h); h = MAX; }
      }
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(c.toDataURL('image/jpeg', 0.92));
    };
    img.onerror = () => { URL.revokeObjectURL(url); resolve(null); };
    img.src = url;
  });
}

// ── Upload handlers ──────────────────────────────────────
const uploadArea = document.getElementById('uploadArea');
const fileInput  = document.getElementById('fileInput');

uploadArea.addEventListener('click', () => fileInput.click());
uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('drag-over'); });
uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('drag-over'));
uploadArea.addEventListener('drop', e => {
  e.preventDefault(); uploadArea.classList.remove('drag-over');
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });

async function handleFile(file) {
  if (!file.type.startsWith('image/')) { alert('請上傳圖片檔案（JPG / PNG）'); return; }
  if (file.size > 15 * 1024 * 1024) { alert('圖片不能超過 15MB'); return; }
  imgMediaType = 'image/jpeg';
  const compressed = await compressImage(file);
  if (!compressed) { alert('圖片讀取失敗，請重試'); return; }
  imgData = compressed;
  document.getElementById('previewImg').src = imgData;
  const btn = document.getElementById('analyzeBtn');
  btn.disabled = false;
  btn.textContent = '🔍 開始 AI 分析';
  showState('s-preview');
}

// ── Loading steps ────────────────────────────────────────
const STEP_DEFS = [
  { icon: '📊', text: '正在讀取圖表結構...' },
  { icon: '🔍', text: '識別關鍵撐壓位...' },
  { icon: '⚡', text: '套用 XAU Elite 破框策略...' },
];

let _streamDone = false;
let _minTimeDone = false;
let _finished = false;
let _stepTimers = [];

function runSteps() {
  _streamDone = false; _minTimeDone = false; _finished = false;
  _stepTimers.forEach(clearTimeout); _stepTimers = [];
  const list = document.getElementById('stepsList');
  list.innerHTML = '';

  STEP_DEFS.forEach((def, i) => {
    const el = document.createElement('div');
    el.className = 'step'; el.id = 'step_' + i;
    el.innerHTML = `<span class="si">${def.icon}</span><span class="st">${def.text}</span><span class="ss"></span>`;
    list.appendChild(el);
    _stepTimers.push(setTimeout(() => {
      el.classList.add('active');
      el.querySelector('.ss').innerHTML = '<span class="spin-icon"></span>';
    }, i * 2100));
    if (i < STEP_DEFS.length - 1) {
      _stepTimers.push(setTimeout(() => markDone(i), (i + 1) * 2100));
    }
  });
  _stepTimers.push(setTimeout(() => { _minTimeDone = true; tryFinish(); }, STEP_DEFS.length * 2100));
}

function markDone(i) {
  const el = document.getElementById('step_' + i);
  if (!el) return;
  el.classList.remove('active'); el.classList.add('done');
  el.querySelector('.ss').textContent = '✓';
}

function tryFinish() {
  if (!_streamDone || !_minTimeDone || _finished) return;
  _finished = true;
  for (let i = 0; i < STEP_DEFS.length; i++) markDone(i);
  const list = document.getElementById('stepsList');
  const el = document.createElement('div');
  el.className = 'step';
  el.style.cssText = 'opacity:0;transform:translateY(5px);color:var(--gold);font-weight:500';
  el.innerHTML = '<span class="si">✅</span><span class="st">分析完成！</span>';
  list.appendChild(el);
  requestAnimationFrame(() => {
    el.style.transition = 'opacity .4s, transform .4s';
    el.style.opacity = '1'; el.style.transform = 'translateY(0)';
  });
  setTimeout(() => { renderResult(); showState('s-result'); }, 800);
}

// ── SSE reader ───────────────────────────────────────────
async function readSSE(response, onChunk) {
  const reader = response.body.getReader();
  const dec = new TextDecoder();
  let buf = '';
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buf += dec.decode(value, { stream: true });
    const lines = buf.split('\n');
    buf = lines.pop();
    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      const payload = line.slice(6).trim();
      if (payload === '[DONE]') return;
      try {
        const d = JSON.parse(payload);
        if (d.error) throw new Error(d.error);
        if (d.text) onChunk(d.text);
      } catch (ex) { /* partial JSON */ }
    }
  }
}

// ── Start analysis ───────────────────────────────────────
async function startAnalysis() {
  if (!imgData) return;
  const btn = document.getElementById('analyzeBtn');
  btn.disabled = true; btn.textContent = '⏳ 分析中...';
  analysisText = '';

  document.getElementById('loadingImg').src = imgData;
  showState('s-loading');
  runSteps();

  try {
    const resp = await fetch('/api/analyze-chart', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ image: imgData, media_type: imgMediaType })
    });
    if (!resp.ok) {
      const e = await resp.json().catch(() => ({}));
      throw new Error(e.error || `HTTP ${resp.status}`);
    }
    await readSSE(resp, chunk => { analysisText += chunk; });
  } catch (e) {
    analysisText = [
      '【方向】', '多空觀望 NEUTRAL ◉', '分析失敗，請重試',
      '', '【關鍵位】', '上方大壓：—', 'TP1 目標：—', '進場觸發：—', '停損基準：—', '下方大撐：—',
      '', '【破框SOP】', `❌ 錯誤：${e.message}`,
      '', '【風險提示】', '• 請確認圖片清晰且包含 K 線圖', '• 建議重新截圖後再試'
    ].join('\n');
  }
  _streamDone = true;
  tryFinish();
}

// ── Parse + render ───────────────────────────────────────
function extractSection(text, key) {
  const re = new RegExp(`【${key}[^】]*】\\s*([\\s\\S]*?)(?=【|$)`);
  const m = text.match(re);
  return m ? m[1].trim() : '';
}

function getLevel(text, label) {
  // Escape regex special chars, then allow flexible spaces between characters
  const esc2 = label.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const relaxed = esc2.replace(/\s+/g, '[\\s　]*');
  // Match label (with optional leading bullet/space) then colon then value
  const re = new RegExp(`[•·\\s]?${relaxed}\\s*[：:﹕]\\s*([^\\n\\r]+)`, 'm');
  const m = text.match(re);
  if (m) {
    const v = m[1].trim();
    // Reject placeholder values the model might output
    if (v && !v.startsWith('$XX') && v !== 'XXXX' && v !== '—') return v;
  }
  return '—';
}

function esc(t) {
  return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderResult() {
  console.log('[analyzer] analysisText:', analysisText);
  const dir     = extractSection(analysisText, '方向');
  const lev     = extractSection(analysisText, '關鍵位');
  console.log('[analyzer] 【關鍵位】 section:', lev);
  const sop     = extractSection(analysisText, '破框SOP');
  const risk    = extractSection(analysisText, '風險提示');
  const notrade = extractSection(analysisText, '不做單');

  // Direction header
  const lines = dir.split('\n').filter(l => l.trim());
  const d0 = lines[0] || '';
  const reason = lines.slice(1).join(' ').trim();
  let type = 'neutral', emoji = '◉';
  if (d0.includes('BULLISH') || d0.includes('多方')) { type = 'bullish'; emoji = '🔼'; }
  else if (d0.includes('BEARISH') || d0.includes('空方')) { type = 'bearish'; emoji = '🔽'; }

  document.getElementById('dirHeader').className = 'dir-header ' + type;
  document.getElementById('dirEmoji').textContent = emoji;
  document.getElementById('dirLabel').textContent = d0;
  document.getElementById('dirSub').textContent = reason;

  // Key levels table
  const LEVEL_DEFS = [
    { cls: 'resistance', label: '上方大壓', key: '上方大壓' },
    { cls: 'tp1',        label: 'TP1 目標', key: 'TP1 目標' },
    { cls: 'entry',      label: '進場觸發', key: '進場觸發' },
    { cls: 'sl',         label: '停損基準', key: '停損基準' },
    { cls: 'support',    label: '下方大撐', key: '下方大撐' },
  ];
  const table = document.getElementById('levelsTable');
  table.innerHTML = '';
  LEVEL_DEFS.forEach(def => {
    const val = getLevel(lev, def.key);
    const row = document.createElement('div');
    row.className = 'level-row ' + def.cls;
    row.innerHTML = `<span class="level-name">${def.label}</span><span class="level-val">${esc(val)}</span>`;
    table.appendChild(row);
  });

  // SOP + Risk
  document.getElementById('sopBody').textContent  = sop  || '—';
  document.getElementById('riskBody').textContent = risk || '—';

  // No-trade warning
  const ntBox = document.getElementById('notradeBox');
  if (notrade && notrade.replace(/[•\s]/g, '')) {
    document.getElementById('notradeBody').textContent = notrade;
    ntBox.style.display = '';
  } else {
    ntBox.style.display = 'none';
  }

  // Thumbnail
  document.getElementById('resultImg').src = imgData;
}
</script>
</body>
</html>
