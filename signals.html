<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XAU Elite | 訊號追蹤</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Noto+Sans+TC:wght@300;400;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#c9a84c;--gold-light:#e8c97a;--gold-dim:rgba(201,168,76,0.15);
  --bg:#080b12;--bg2:#0d1220;--bg3:#111827;
  --border:rgba(201,168,76,0.2);--text:#e8eaf0;--text-dim:#6b7a99;
  --green:#34d399;--red:#f87171;--blue:#60a5fa;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 20% 20%,rgba(201,168,76,0.04) 0%,transparent 60%);pointer-events:none;z-index:0;}

/* ── NAV ── */
nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(8,11,18,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 40px;height:64px;display:flex;align-items:center;gap:24px;}
.nav-logo{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--gold);letter-spacing:2px;text-decoration:none;white-space:nowrap;flex-shrink:0;}
.nav-logo span{color:var(--text-dim);font-weight:400;font-size:12px;margin-left:8px;font-family:'IBM Plex Mono',monospace;letter-spacing:1px;}
.nav-links{display:flex;align-items:center;gap:2px;flex:1;}
.nav-link{padding:6px 14px;border-radius:6px;font-size:13px;font-weight:500;color:var(--text-dim);text-decoration:none;transition:all 0.2s;white-space:nowrap;}
.nav-link:hover,.nav-link.active{color:var(--gold);background:var(--gold-dim);}
.nav-apply{padding:7px 18px;background:var(--gold-dim);border:1px solid var(--border);border-radius:8px;color:var(--gold);font-size:13px;font-weight:600;text-decoration:none;white-space:nowrap;margin-left:auto;flex-shrink:0;}
.nav-apply:hover{background:rgba(201,168,76,0.28);}

/* ── PAGE ── */
.page{padding:96px 40px 60px;max-width:1200px;margin:0 auto;position:relative;z-index:1;}
.page-head{margin-bottom:32px;}
.page-title{font-family:'Playfair Display',serif;font-size:28px;font-weight:900;color:#f0f4ff;margin-bottom:6px;}
.page-sub{font-size:13px;color:var(--text-dim);font-family:'IBM Plex Mono',monospace;}

/* ── STATS CARDS ── */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:32px;}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:20px 24px;position:relative;overflow:hidden;}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.stat-card.green::before{background:linear-gradient(90deg,var(--green),transparent);}
.stat-card.gold::before{background:linear-gradient(90deg,var(--gold),transparent);}
.stat-card.red::before{background:linear-gradient(90deg,var(--red),transparent);}
.stat-card.blue::before{background:linear-gradient(90deg,var(--blue),transparent);}
.stat-label{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;}
.stat-val{font-family:'Playfair Display',serif;font-size:36px;font-weight:900;line-height:1;margin-bottom:4px;}
.stat-val.green{color:var(--green);}
.stat-val.gold{color:var(--gold);}
.stat-val.red{color:var(--red);}
.stat-val.blue{color:var(--blue);}
.stat-sub{font-size:12px;color:var(--text-dim);}
.stat-bar{height:4px;background:rgba(255,255,255,0.06);border-radius:2px;margin-top:12px;overflow:hidden;}
.stat-bar-fill{height:100%;border-radius:2px;transition:width 0.6s ease;}

/* ── FILTER ── */
.filter-row{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
.filter-label{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text-dim);letter-spacing:0.5px;}
.month-tabs{display:flex;gap:6px;flex-wrap:wrap;}
.month-tab{padding:5px 14px;border-radius:6px;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;border:1px solid var(--border);background:var(--bg3);color:var(--text-dim);cursor:pointer;transition:all 0.2s;}
.month-tab:hover{border-color:rgba(201,168,76,0.4);color:var(--gold);}
.month-tab.active{background:var(--gold-dim);border-color:var(--gold);color:var(--gold);}
.total-count{margin-left:auto;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text-dim);}

/* ── TABLE ── */
.table-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:16px;overflow:hidden;}
.table-head{padding:16px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.table-title{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase;}
table{width:100%;border-collapse:collapse;}
thead tr{background:var(--bg3);}
th{padding:11px 20px;text-align:left;font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid var(--border);}
th:last-child,td:last-child{text-align:right;}
tbody tr{border-bottom:1px solid rgba(255,255,255,0.04);transition:background 0.15s;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:rgba(255,255,255,0.02);}
td{padding:12px 20px;font-size:13px;}
.td-date{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--text-dim);}
.td-dir{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:700;font-family:'IBM Plex Mono',monospace;}
.td-dir.long{background:rgba(52,211,153,0.1);border:1px solid rgba(52,211,153,0.25);color:var(--green);}
.td-dir.short{background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.25);color:var(--red);}
.td-price{font-family:'IBM Plex Mono',monospace;font-weight:600;color:var(--gold);}
.td-result{display:inline-flex;align-items:center;gap:5px;font-size:13px;font-weight:600;}
.td-result.win{color:var(--green);}
.td-result.loss{color:var(--red);}
.td-pnl{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;text-align:right;}
.td-pnl.pos{color:var(--green);}
.td-pnl.neg{color:var(--red);}
.td-pnl.zero{color:var(--text-dim);}
.td-note{font-size:11px;color:var(--text-dim);max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.empty-row td{text-align:center;padding:40px;color:var(--text-dim);font-family:'IBM Plex Mono',monospace;font-size:12px;}

/* ── WIN RATE BAR CHART ── */
.chart-section{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:24px;margin-top:24px;}
.chart-title{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase;margin-bottom:20px;}
.mini-bars{display:flex;align-items:flex-end;gap:6px;height:80px;}
.mini-bar-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;}
.mini-bar{width:100%;border-radius:4px 4px 0 0;transition:height 0.4s ease;min-height:2px;}
.mini-bar.win{background:var(--green);}
.mini-bar.loss{background:var(--red);}
.mini-bar.empty{background:var(--bg3);}
.mini-bar-label{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text-dim);}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--green);color:var(--green);padding:10px 24px;border-radius:8px;font-size:13px;font-family:'IBM Plex Mono',monospace;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:999;}
.toast.show{opacity:1;}
.toast.error{border-color:var(--red);color:var(--red);}

.hamburger{display:none;background:none;border:1px solid rgba(201,168,76,0.3);border-radius:6px;color:var(--gold);font-size:20px;width:36px;height:36px;cursor:pointer;align-items:center;justify-content:center;flex-shrink:0;line-height:1;padding:0;}
.mobile-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:299;}
.mobile-overlay.show{display:block;}
.mobile-menu{position:fixed;top:0;right:-280px;width:260px;height:100vh;background:rgba(8,11,18,0.98);backdrop-filter:blur(20px);border-left:1px solid rgba(201,168,76,0.15);z-index:300;transition:right 0.3s ease;padding:24px 20px;display:flex;flex-direction:column;gap:4px;overflow-y:auto;}
.mobile-menu.open{right:0;}
.mobile-menu-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid rgba(201,168,76,0.12);}
.mobile-menu-logo{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:var(--gold);letter-spacing:2px;}
.mobile-close{background:none;border:1px solid rgba(201,168,76,0.2);border-radius:6px;color:var(--text-dim);font-size:16px;width:32px;height:32px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.mobile-link{display:block;padding:12px 16px;border-radius:8px;color:var(--text-dim);text-decoration:none;font-size:14px;font-weight:500;transition:all 0.2s;}
.mobile-link:hover,.mobile-link.active{color:var(--gold);background:rgba(201,168,76,0.08);}
/* ── RWD ── */
@media(max-width:900px){
  nav{padding:0 20px;gap:16px;}
  .nav-links{display:none;}
  .hamburger{display:flex;}
  .page{padding:88px 20px 40px;}
  .stats-grid{grid-template-columns:repeat(2,1fr);}
}
@media(max-width:600px){
  .nav-logo span{display:none;}
  .stats-grid{grid-template-columns:1fr 1fr;}
  .table-wrap{overflow-x:auto;}
  table{min-width:520px;}
  th:nth-child(6),td:nth-child(6){display:none;}
}
</style>
</head>
<body>

<nav>
  <a href="/index.html" class="nav-logo">XAU ELITE <span>GOLD SIGNALS</span></a>
  <ul class="nav-links" style="list-style:none;">
    <li><a href="/index.html" class="nav-link" data-zh="首頁" data-en="Home">首頁</a></li>
    <li><a href="/daily.html" class="nav-link" data-zh="日內分析" data-en="Intraday">日內分析</a></li>
    <li><a href="/analyzer.html" class="nav-link" data-zh="AI圖表" data-en="AI Chart">AI圖表</a></li>
    <li><a href="/signals.html" class="nav-link active" data-zh="訊號紀錄" data-en="Signals">訊號紀錄</a></li>
    <li><a href="/macro.html" class="nav-link" data-zh="總經" data-en="Macro">總經</a></li>
  </ul>
  <a href="/index.html#apply" class="nav-apply">申請加入</a>
  <button class="hamburger" id="hamburger" onclick="toggleMobileMenu()">☰</button>
</nav>
<div class="mobile-overlay" id="mobileOverlay" onclick="toggleMobileMenu()"></div>
<div class="mobile-menu" id="mobileMenu">
  <div class="mobile-menu-head">
    <span class="mobile-menu-logo">XAU ELITE</span>
    <button class="mobile-close" onclick="toggleMobileMenu()">✕</button>
  </div>
  <a href="/index.html" class="mobile-link" data-zh="首頁" data-en="Home">首頁</a>
  <a href="/daily.html" class="mobile-link" data-zh="日內分析" data-en="Intraday">日內分析</a>
  <a href="/analyzer.html" class="mobile-link" data-zh="AI圖表" data-en="AI Chart">AI圖表</a>
  <a href="/signals.html" class="mobile-link active" data-zh="訊號紀錄" data-en="Signals">訊號紀錄</a>
  <a href="/macro.html" class="mobile-link" data-zh="總經" data-en="Macro">總經</a>
</div>

<div class="page">

  <div class="page-head">
    <div class="page-title">訊號追蹤</div>
    <div class="page-sub">XAU/USD · 歷史訊號勝敗紀錄 · 績效統計</div>
  </div>

  <!-- Stats cards -->
  <div class="stats-grid">
    <div class="stat-card green">
      <div class="stat-label">本月勝率</div>
      <div class="stat-val green" id="statWinRate">—</div>
      <div class="stat-sub" id="statWinSub">— 勝 / — 敗</div>
      <div class="stat-bar"><div class="stat-bar-fill" id="winRateBar" style="background:var(--green);width:0%"></div></div>
    </div>
    <div class="stat-card gold">
      <div class="stat-label">本月訊號數</div>
      <div class="stat-val gold" id="statTotal">—</div>
      <div class="stat-sub">本月總筆數</div>
    </div>
    <div class="stat-card blue">
      <div class="stat-label">平均盈虧</div>
      <div class="stat-val blue" id="statAvgPnl">—</div>
      <div class="stat-sub">點數 / 筆</div>
    </div>
    <div class="stat-card gold">
      <div class="stat-label">連勝紀錄</div>
      <div class="stat-val gold" id="statStreak">—</div>
      <div class="stat-sub">當前連勝</div>
    </div>
  </div>

  <!-- Filter -->
  <div class="filter-row">
    <span class="filter-label">篩選月份</span>
    <div class="month-tabs" id="monthTabs"></div>
    <span class="total-count" id="totalCount"></span>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <div class="table-head">
      <span class="table-title">訊號歷史紀錄</span>
    </div>
    <table>
      <thead>
        <tr>
          <th>日期</th>
          <th>方向</th>
          <th>進場價</th>
          <th>結果</th>
          <th>盈虧點數</th>
          <th>備註</th>
        </tr>
      </thead>
      <tbody id="signalsTbody">
        <tr><td colspan="6" style="text-align:center;padding:32px;color:var(--text-dim);font-family:'IBM Plex Mono',monospace;font-size:12px;">載入中...</td></tr>
      </tbody>
    </table>
  </div>

  <!-- Mini chart -->
  <div class="chart-section">
    <div class="chart-title">近30筆勝敗分佈</div>
    <div class="mini-bars" id="miniBars"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
function toggleMobileMenu(){
  document.getElementById('mobileMenu').classList.toggle('open');
  document.getElementById('mobileOverlay').classList.toggle('show');
}

let currentMonth = '';
let allMonths = [];

function showToast(msg, err=false){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast show'+(err?' error':'');
  setTimeout(()=>{ t.className='toast'; },3000);
}

// Build last 6 months list
function buildMonths(){
  const months = [];
  const now = new Date();
  for(let i=0; i<6; i++){
    const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
    const key = d.toISOString().slice(0,7);
    const label = d.toLocaleDateString('zh-TW',{year:'numeric',month:'short'});
    months.push({key, label});
  }
  return months;
}

function renderMonthTabs(months, active){
  const container = document.getElementById('monthTabs');
  const allTab = `<div class="month-tab${active===''?' active':''}" onclick="selectMonth('')">全部</div>`;
  const tabs = months.map(m =>
    `<div class="month-tab${active===m.key?' active':''}" onclick="selectMonth('${m.key}')">${m.label}</div>`
  ).join('');
  container.innerHTML = allTab + tabs;
}

async function selectMonth(month){
  currentMonth = month;
  renderMonthTabs(allMonths, month);
  await Promise.all([loadStats(month), loadSignals(month)]);
}

async function loadStats(month){
  try{
    const url = '/api/signals/stats'+(month?`?month=${month}`:'');
    const res = await fetch(url);
    const data = await res.json();
    if(!data.ok) return;

    const wrEl = document.getElementById('statWinRate');
    const wr = data.win_rate || 0;
    wrEl.textContent = wr+'%';
    wrEl.className = 'stat-val '+(wr>=55?'green':wr>=45?'gold':'red');
    document.getElementById('statWinSub').textContent = `${data.wins||0} 勝 / ${data.losses||0} 敗`;
    document.getElementById('winRateBar').style.width = wr+'%';
    document.getElementById('winRateBar').style.background = wr>=55?'var(--green)':wr>=45?'var(--gold)':'var(--red)';

    const totalEl = document.getElementById('statTotal');
    totalEl.textContent = data.total||0;

    const pnlEl = document.getElementById('statAvgPnl');
    const pnl = data.avg_pnl||0;
    pnlEl.textContent = (pnl>0?'+':'')+pnl;
    pnlEl.className = 'stat-val '+(pnl>0?'green':pnl<0?'red':'blue');

    document.getElementById('statStreak').textContent = data.streak||0;
  }catch(e){ console.warn('stats load failed', e); }
}

async function loadSignals(month){
  try{
    const url = '/api/signals?limit=200'+(month?`&month=${month}`:'');
    const res = await fetch(url);
    const data = await res.json();
    if(!data.ok) return;

    const sigs = data.signals || [];
    document.getElementById('totalCount').textContent = sigs.length + ' 筆紀錄';

    const tbody = document.getElementById('signalsTbody');
    if(!sigs.length){
      tbody.innerHTML = '<tr class="empty-row"><td colspan="6">此月份尚無訊號紀錄</td></tr>';
      renderMiniChart([]);
      return;
    }

    tbody.innerHTML = sigs.map(s => {
      const dir = s.direction === 'long'
        ? '<span class="td-dir long">▲ 多</span>'
        : '<span class="td-dir short">▼ 空</span>';
      const result = s.result === 'win'
        ? '<span class="td-result win">✅ 勝</span>'
        : '<span class="td-result loss">❌ 敗</span>';
      const pnl = s.pnl_points != null
        ? `<span class="td-pnl ${s.pnl_points>0?'pos':s.pnl_points<0?'neg':'zero'}">${s.pnl_points>0?'+':''}${s.pnl_points}</span>`
        : '<span class="td-pnl zero">—</span>';
      return `<tr>
        <td class="td-date">${s.date}</td>
        <td>${dir}</td>
        <td class="td-price">${s.entry_price!=null?s.entry_price.toFixed(1):'—'}</td>
        <td>${result}</td>
        <td>${pnl}</td>
        <td class="td-note">${s.note||'—'}</td>
      </tr>`;
    }).join('');

    renderMiniChart(sigs.slice(0,30).reverse());
  }catch(e){ console.warn('signals load failed', e); }
}

function renderMiniChart(sigs){
  const container = document.getElementById('miniBars');
  if(!sigs.length){
    container.innerHTML = '<div style="color:var(--text-dim);font-size:12px;font-family:\'IBM Plex Mono\',monospace;">尚無數據</div>';
    return;
  }
  const maxAbs = Math.max(...sigs.map(s=>Math.abs(s.pnl_points||1)), 1);
  container.innerHTML = sigs.map((s, i) => {
    const pnl = s.pnl_points || 0;
    const h = Math.max(4, Math.round((Math.abs(pnl)/maxAbs)*70));
    const cls = s.result==='win'?'win':'loss';
    const label = (i+1)%5===0?(i+1):'';
    return `<div class="mini-bar-wrap">
      <div class="mini-bar ${cls}" style="height:${h}px" title="${s.date} ${pnl>0?'+':''}${pnl}pts"></div>
      <span class="mini-bar-label">${label}</span>
    </div>`;
  }).join('');
}

// Init
const allMonthsList = buildMonths();
allMonths = allMonthsList;
const thisMonth = new Date().toISOString().slice(0,7);
currentMonth = thisMonth;
renderMonthTabs(allMonthsList, thisMonth);
loadStats(thisMonth);
loadSignals(thisMonth);
</script>
</body>
</html>
